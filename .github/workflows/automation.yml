name: 🛡️ DevSecOps Ministack CI/CD (DR Simulation)

on:
  push:
    branches: [main, develop]
    paths:
      - 'TodoWebAPI/**'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]
      manual_dr_trigger:
        description: 'Force DR failover to us-east-2 (laptop)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

env:
  DOTNET_VERSION:        '8.0.x'
  APP_DLL:               TodoWebAPI.dll
  APP_NAME:              todo-webapi
  CONTAINER_NAME:        todo-webapi
  HOST_PORT:             8080
  CONTAINER_PORT:        5000

  MINISTACK_ENDPOINT:    ${{ secrets.LOCALSTACK_ENDPOINT || 'http://localhost:4566' }}
  AWS_REGION_PRIMARY:    us-east-1
  AWS_REGION_DR:         us-east-2
  AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  DB_NAME:               ${{ secrets.DB_NAME }}
  DB_USER:               ${{ secrets.DB_USER }}
  DB_PASSWORD:           ${{ secrets.DB_PASSWORD }}
  DB_PORT:               ${{ secrets.DB_PORT || '3306' }}

  TF_STATE_BUCKET:       ${{ secrets.TF_STATE_BUCKET }}

permissions:
  contents: read
  security-events: write
  actions: read
  checks: write

jobs:
  # --------------------------------------------------------------------------
  # 🧠 DR Decision & Routing
  # --------------------------------------------------------------------------
  dr-check:
    name: 🧠 DR Decision
    runs-on: ubuntu-latest
    outputs:
      active_region:    ${{ steps.set.outputs.region }}
      runner_label:     ${{ steps.set.outputs.runner }}
      ministack_port:   ${{ steps.set.outputs.port }}
      failover:         ${{ steps.set.outputs.failover }}
      state_key_prefix: ${{ steps.set.outputs.state_prefix }}
    steps:
      - id: set
        run: |
          FAIL="${{ github.event.inputs.manual_dr_trigger }}"
          if [ "$FAIL" == "true" ]; then
            REGION="${{ env.AWS_REGION_DR }}"
            RUNNER="[self-hosted, linux, x64]"
            PORT="4567"
            PREFIX="ministack/us-east-2"
          else
            REGION="${{ env.AWS_REGION_PRIMARY }}"
            RUNNER="ubuntu-latest"
            PORT="4566"
            PREFIX="ministack/us-east-1"
          fi
          echo "region=$REGION"           >> $GITHUB_OUTPUT
          echo "runner=$RUNNER"           >> $GITHUB_OUTPUT
          echo "port=$PORT"               >> $GITHUB_OUTPUT
          echo "failover=$FAIL"           >> $GITHUB_OUTPUT
          echo "state_prefix=$PREFIX"     >> $GITHUB_OUTPUT
          echo "🔄 DR Decision: region=$REGION | runner=$RUNNER | port=$PORT | failover=$FAIL"

  # --------------------------------------------------------------------------
  # 🔐 SAST & Secrets
  # --------------------------------------------------------------------------
  sast:
    name: 🔐 SAST & Secrets
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 🔐 Gitleaks – secret scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: 🔧 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: 🧬 Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
      - name: 🔨 Build for CodeQL
        run: cd TodoWebAPI && dotnet build TodoWebAPI.csproj
      - name: 🧬 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # --------------------------------------------------------------------------
  # 📦 SCA & SBOM
  # --------------------------------------------------------------------------
  sca:
    name: 📦 SCA & SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 🔧 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: 🔍 Audit NuGet vulnerabilities
        run: |
          dotnet restore TodoWebAPI/*.csproj
          dotnet list TodoWebAPI/*.csproj package --vulnerable --include-transitive || true
      - name: 📄 Generate SBOM (CycloneDX)
        uses: CycloneDX/gh-dotnet-generate-sbom@v1
        with:
          path: TodoWebAPI
          output: sbom.xml
      - name: 📤 Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: TodoWebAPI/sbom.xml

  # --------------------------------------------------------------------------
  # 🔨 Build & Publish
  # --------------------------------------------------------------------------
  build:
    name: 🔨 Build & Publish
    runs-on: ubuntu-latest
    needs: [sast, sca]
    steps:
      - uses: actions/checkout@v4
      - name: 🗃️ Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
      - name: 🔧 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: 🩹 Patch Microsoft.Build vulnerability
        run: |
          for proj in TodoWebAPI/*.csproj; do
            dotnet add "$proj" package Microsoft.Build --version 17.8.43
          done
      - name: 🔨 Restore, Build & Publish
        run: |
          dotnet restore TodoWebAPI/*.csproj
          dotnet build   TodoWebAPI/*.csproj -c Release --no-restore
          dotnet publish TodoWebAPI/*.csproj -c Release --no-build -o publish_output
      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-binaries
          path: publish_output/
          retention-days: 7

  # --------------------------------------------------------------------------
  # 🐳 Container Build & Scan
  # --------------------------------------------------------------------------
  container:
    name: 🐳 Container Build & Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: ⬇️ Download artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-binaries
          path: deploy/publish
      - name: 🐳 Create hardened Dockerfile
        run: |
          cat > deploy/Dockerfile <<'DOCKERFILE'
          FROM mcr.microsoft.com/dotnet/aspnet:8.0-alpine
          WORKDIR /app
          RUN apk update && apk upgrade --no-cache && apk add --no-cache openssl
          RUN openssl req -x509 -newkey rsa:4096 -keyout /app/https-key.pem -out /app/https-cert.pem -days 365 -nodes -subj '/CN=localhost' && \
              openssl pkcs12 -export -out /app/aspnetapp.pfx -inkey /app/https-key.pem -in /app/https-cert.pem -passout pass:devpassword && \
              rm /app/https-key.pem /app/https-cert.pem && apk del openssl
          ENV ASPNETCORE_ENVIRONMENT=Production
          ENV ASPNETCORE_Kestrel__Certificates__Default__Path=/app/aspnetapp.pfx
          ENV ASPNETCORE_Kestrel__Certificates__Default__Password=devpassword
          RUN adduser -u 1000 --disabled-password --gecos "" appuser && chown -R appuser /app
          USER appuser
          EXPOSE 5000 5001
          COPY publish/ /app/
          ENTRYPOINT ["dotnet", "TodoWebAPI.dll"]
          DOCKERFILE
      - name: 🏗️ Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: deploy
          load: true
          tags: todo-webapi:latest
      - name: 🛡️ Trivy scan – upload SARIF
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: todo-webapi:latest
          format: sarif
          output: trivy-results.sarif
          severity: 'CRITICAL,HIGH'
          scanners: vuln
        env:
          TRIVY_DISABLE_VEX_NOTICE: true
      - name: 📤 Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
      - name: 🛡️ Trivy scan – fail on CRITICAL/HIGH
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: todo-webapi:latest
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          scanners: vuln
        env:
          TRIVY_DISABLE_VEX_NOTICE: true

  # --------------------------------------------------------------------------
  # 📋 Pre-Deploy Checklist
  # --------------------------------------------------------------------------
  pre-deploy-summary:
    name: 📋 Deployment Checklist
    runs-on: ubuntu-latest
    needs: [container, dr-check]
    steps:
      - name: 📝 Generate Deployment Checklist
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          REGION="${{ needs.dr-check.outputs.active_region }}"
          FAILOVER="${{ needs.dr-check.outputs.failover }}"
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## 🚀 Deployment Readiness Checklist
          | Item | Status |
          |------|--------|
          | 🔐 SAST & Secret Scan | ✅ |
          | 📦 SCA & SBOM Generated | ✅ |
          | 🔨 Build & Publish | ✅ |
          | 🐳 Container Scan (Trivy) | ✅ |
          | 🌍 Target Region | \`${REGION}\` |
          | 🖥️ Runner | \`${{ needs.dr-check.outputs.runner_label }}\` |
          | 🔄 DR Failover | \`${FAILOVER}\` |
          | 🗂️ Environment | \`${ENV}\` |
          > ✅ Semua gate CI/DevSecOps telah terpenuhi. Health check wajib di region ini.
          EOF

  # --------------------------------------------------------------------------
  # 🏗️ Mock Infrastructure + MySQL
  # --------------------------------------------------------------------------
  infra:
    name: 🏗️ Mock Infrastructure + MySQL
    runs-on: ${{ needs.dr-check.outputs.runner_label }}
    needs: [dr-check, pre-deploy-summary]
    outputs:
      s3_bucket:     ${{ steps.tf.outputs.s3_bucket }}
      ec2_public_ip: ${{ steps.tf.outputs.ec2_public_ip }}
    steps:
      - uses: actions/checkout@v4
      - name: 🔍 Check Terraform
        run: |
          if ! command -v terraform &> /dev/null; then
            curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
            echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
            sudo apt-get update && sudo apt-get install -y terraform
          fi
          echo "✅ Terraform ready"
      - name: 🐳 Start MySQL
        run: |
          docker rm -f mock-rds-mysql 2>/dev/null || true
          docker run -d --name mock-rds-mysql -p 3306:3306 \
            -e MYSQL_ROOT_PASSWORD="${{ env.DB_PASSWORD }}" \
            -e MYSQL_DATABASE="${{ env.DB_NAME }}" \
            -e MYSQL_USER="${{ env.DB_USER }}" \
            -e MYSQL_PASSWORD="${{ env.DB_PASSWORD }}" \
            mysql:8.0
          for i in $(seq 1 30); do
            docker exec mock-rds-mysql mysqladmin ping -u"${{ env.DB_USER }}" -p"${{ env.DB_PASSWORD }}" --silent 2>/dev/null && break
            sleep 2
          done
      - name: 🐳 Ensure Ministack (Region-Aware Port)
        run: |
          PORT="${{ needs.dr-check.outputs.ministack_port }}"
          docker rm -f ministack 2>/dev/null || true
          docker run -d --name ministack -p ${PORT}:4566 -e SERVICES=ec2,s3,sts,iam nahuelnucera/ministack:latest
          for i in $(seq 1 30); do
            curl -sf "http://localhost:${PORT}/_localstack/health" | grep -q '"s3":"available"' && break
            sleep 3
          done
      - name: 📝 Create Terraform config
        run: |
          mkdir -p terraform
          cat > terraform/main.tf <<'TF'
          terraform {
            backend "s3" {
              bucket  = "${{ env.TF_STATE_BUCKET }}"
              key     = "${{ needs.dr-check.outputs.state_key_prefix }}/${{ github.event.inputs.environment || 'staging' }}/terraform.tfstate"
              region  = "us-east-1"
              encrypt = true
            }
            required_providers {
              aws = { source = "hashicorp/aws", version = "~> 5.0" }
              random = { source = "hashicorp/random", version = "~> 3.0" }
            }
          }
          variable "ministack_endpoint" { default = "http://localhost:${{ needs.dr-check.outputs.ministack_port }}" }
          variable "environment"        { default = "staging" }
          variable "aws_region"         { default = "${{ needs.dr-check.outputs.active_region }}" }
          provider "aws" {
            region     = var.aws_region
            access_key = "test"
            secret_key = "test"
            skip_credentials_validation = true
            skip_requesting_account_id  = true
            skip_metadata_api_check     = true
            s3_use_path_style           = true
            endpoints { 
              ec2 = var.ministack_endpoint
              s3  = var.ministack_endpoint
              sts = var.ministack_endpoint
              iam = var.ministack_endpoint
            }
          }
          resource "random_id" "suffix" { byte_length = 4 }
          resource "aws_security_group" "web_sg" {
            name        = "web-sg-${var.environment}-${var.aws_region}"
            description = "SG for ${var.aws_region}"
            tags = { Name = "web-sg-${var.environment}", Project = "DevSecOps", Region = var.aws_region }
            ingress {
              from_port   = 22
              to_port     = 22
              protocol    = "tcp"
              cidr_blocks = ["0.0.0.0/0"]
            }
            ingress {
              from_port   = 80
              to_port     = 80
              protocol    = "tcp"
              cidr_blocks = ["0.0.0.0/0"]
            }
            ingress {
              from_port   = 443
              to_port     = 443
              protocol    = "tcp"
              cidr_blocks = ["0.0.0.0/0"]
            }
            egress {
              from_port   = 0
              to_port     = 0
              protocol    = "-1"
              cidr_blocks = ["0.0.0.0/0"]
            }
          }
          resource "aws_instance" "web" {
            ami             = "ami-0ff8a91507f77f867"
            instance_type   = "t2.micro"
            security_groups = [aws_security_group.web_sg.name]
            tags = { Name = "web-server-${var.environment}", Project = "DevSecOps", Region = var.aws_region }
          }
          resource "aws_s3_bucket" "app_bucket" {
            bucket = "app-bucket-${var.environment}-${var.aws_region}-${random_id.suffix.hex}"
            tags   = { Project = "DevSecOps", Region = var.aws_region }
          }
          output "s3_bucket"     { value = aws_s3_bucket.app_bucket.bucket }
          output "ec2_public_ip" { value = aws_instance.web.public_ip }
          TF
      - name: 🗃️ Init & Apply Terraform
        id: tf
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_STATE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_STATE_SECRET_KEY }}
          AWS_DEFAULT_REGION:    us-east-1
        run: |
          terraform init -input=false -reconfigure -upgrade
          terraform apply -auto-approve -input=false \
            -var="environment=${{ github.event.inputs.environment || 'staging' }}" \
            -var="aws_region=${{ needs.dr-check.outputs.active_region }}"
          echo "s3_bucket=$(terraform output -raw s3_bucket)"         >> $GITHUB_OUTPUT
          echo "ec2_public_ip=$(terraform output -raw ec2_public_ip)" >> $GITHUB_OUTPUT

  # --------------------------------------------------------------------------
  # 🗂️ DB Init
  # --------------------------------------------------------------------------
  db-init:
    name: 🗂️ Initialize DB Tables
    runs-on: ${{ needs.dr-check.outputs.runner_label }}
    needs: infra
    steps:
      - name: 🗂️ Create tables
        run: |
          docker exec -i mock-rds-mysql mysql -u"${{ env.DB_USER }}" -p"${{ env.DB_PASSWORD }}" "${{ env.DB_NAME }}" <<'SQL'
          CREATE TABLE IF NOT EXISTS TodoItems (
            Id INT PRIMARY KEY AUTO_INCREMENT,
            Name VARCHAR(255) NULL,
            IsComplete TINYINT(1) NOT NULL DEFAULT 0,
            CreatedAt TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
            UpdatedAt TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
          ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
          SQL
          echo "✅ DB initialized in ${{ needs.dr-check.outputs.active_region }}"

  # --------------------------------------------------------------------------
  # 🚀 Deploy + 🔍 Health Check (WAJIB di US-EAST-1 & US-EAST-2)
  # --------------------------------------------------------------------------
  deploy:
    name: 🚀 Deploy & Health Check
    runs-on: ${{ needs.dr-check.outputs.runner_label }}
    needs: [container, db-init, dr-check]
    environment: ${{ github.ref_name == 'develop' && '' || github.event.inputs.environment }}
    steps:
      - name: ⬇️ Download artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-binaries
          path: ./artifact
      - name: 📂 Prepare deploy_input
        run: |
          rm -rf deploy_input && mkdir -p deploy_input/publish
          cp -r ./artifact/. deploy_input/publish/
          cat > deploy_input/Dockerfile <<'DOCKERFILE'
          FROM mcr.microsoft.com/dotnet/aspnet:8.0-alpine
          WORKDIR /app
          RUN apk update && apk upgrade --no-cache && apk add --no-cache openssl
          RUN openssl req -x509 -newkey rsa:4096 -keyout /app/https-key.pem -out /app/https-cert.pem -days 365 -nodes -subj '/CN=localhost' && \
              openssl pkcs12 -export -out /app/aspnetapp.pfx -inkey /app/https-key.pem -in /app/https-cert.pem -passout pass:devpassword && \
              rm /app/https-key.pem /app/https-cert.pem && apk del openssl
          ENV ASPNETCORE_ENVIRONMENT=Production
          RUN adduser -u 1000 --disabled-password --gecos "" appuser && chown -R appuser /app
          USER appuser
          EXPOSE 5000 5001
          COPY publish/ /app/
          ENTRYPOINT ["dotnet", "TodoWebAPI.dll"]
          DOCKERFILE
      - name: 🏗️ Build Docker image
        run: docker build -t ${APP_NAME}:latest ./deploy_input
      - name: 🧹 Remove old container
        run: docker rm -f ${CONTAINER_NAME} 2>/dev/null || true
      - name: 🚀 Run container
        run: |
          docker run -d --name ${CONTAINER_NAME} --network host \
            -e ASPNETCORE_URLS=http://+:${HOST_PORT} \
            -e "ConnectionStrings__DefaultConnection=Server=127.0.0.1;Port=3306;Database=${{ env.DB_NAME }};Uid=${{ env.DB_USER }};Pwd=${{ env.DB_PASSWORD }};" \
            --security-opt="no-new-privileges:true" --read-only --tmpfs /tmp \
            ${APP_NAME}:latest
      - name: 🔍 WAJIB Health Check (Region-Aware)
        run: |
          echo "⏳ Polling health endpoint in ${{ needs.dr-check.outputs.active_region }}..."
          HEALTH_URL="http://localhost:${CONTAINER_PORT}/swagger/v1/swagger.json"
          for i in $(seq 1 12); do
            if curl -sf "$HEALTH_URL" >/dev/null 2>&1; then
              echo "✅ HEALTH CHECK PASSED in ${{ needs.dr-check.outputs.active_region }} after $((i * 5))s"
              echo "🌐 App accessible at: http://localhost:${HOST_PORT}"
              exit 0
            fi
            sleep 5
          done
          echo "❌ HEALTH CHECK FAILED in ${{ needs.dr-check.outputs.active_region }}"
          docker logs ${CONTAINER_NAME}
          exit 1

  # --------------------------------------------------------------------------
  # 🕷️ DAST Scan
  # --------------------------------------------------------------------------
  dast:
    name: 🕷️ DAST Scan
    runs-on: ${{ needs.dr-check.outputs.runner_label }}
    needs: deploy
    steps:
      - name: 🕷️ Run ZAP baseline scan
        run: |
          docker run --rm --network host ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t "http://localhost:${HOST_PORT}" -l FAIL || {
              echo "❌ DAST failed in ${{ needs.dr-check.outputs.active_region }}"
              exit 1
            }
          echo "✅ DAST passed in ${{ needs.dr-check.outputs.active_region }}"

  # --------------------------------------------------------------------------
  # 🌐 Traffic Switch & Status
  # --------------------------------------------------------------------------
  traffic:
    name: 🌐 Traffic Status
    runs-on: ubuntu-latest
    needs: [dr-check, deploy, dast]
    steps:
      - name: 📊 Simulate Traffic Routing
        run: |
          REGION="${{ needs.dr-check.outputs.active_region }}"
          FAILOVER="${{ needs.dr-check.outputs.failover }}"
          echo "🌐 Active Region      : $REGION"
          echo "🔄 DR Failover Active : $FAILOVER"
          echo "✅ Health Check       : PASSED"
          echo "🔍 DAST Scan          : PASSED"
          if [ "$FAILOVER" == "true" ]; then
            echo "📍 Traffic routed to : Laptop (us-east-2) via http://localhost:${{ env.HOST_PORT }}"
          else
            echo "📍 Traffic routed to : GitHub CI Host (us-east-1) via http://localhost:${{ env.HOST_PORT }}"
          fi

  # --------------------------------------------------------------------------
  # 🧹 Conditional Cleanup
  # --------------------------------------------------------------------------
  cleanup:
    name: 🧹 Conditional Cleanup
    runs-on: ${{ needs.dr-check.outputs.runner_label }}
    needs: [traffic, dast, dr-check]
    if: always() && (needs.dast.result != 'success' || github.event.inputs.environment == 'production')
    steps:
      - name: 🗑️ Cleanup Resources
        env:
          MINISTACK_PORT: ${{ needs.dr-check.outputs.ministack_port }}
          AWS_ENDPOINT_URL: http://localhost:${{ needs.dr-check.outputs.ministack_port }}
        run: |
          echo "🧹 Cleaning up ${{ needs.dr-check.outputs.active_region }} resources..."
          docker rm -f ${CONTAINER_NAME} mock-rds-mysql 2>/dev/null || true
          REGION="${{ needs.dr-check.outputs.active_region }}"
          aws ec2 describe-instances --filters "Name=tag:Region,Values=$REGION" --query "Reservations[*].Instances[*].InstanceId" --output text 2>/dev/null | tr '\t' '\n' | while read ID; do
            [ -n "$ID" ] && aws ec2 terminate-instances --instance-ids "$ID" || true
          done
          aws s3api list-buckets --query "Buckets[?contains(Name,'$REGION')].Name" --output text 2>/dev/null | tr '\t' '\n' | while read BUCKET; do
            [ -n "$BUCKET" ] && aws s3 rm "s3://$BUCKET" --recursive || true
            [ -n "$BUCKET" ] && aws s3 rb "s3://$BUCKET" --force || true
          done
          echo "✅ Cleanup complete."

  # --------------------------------------------------------------------------
  # 📢 Notification
  # --------------------------------------------------------------------------
  notify:
    name: 📢 Pipeline Summary
    runs-on: ubuntu-latest
    needs: [traffic, dast, cleanup, dr-check]
    if: always()
    steps:
      - name: 📊 Print Summary
        run: |
          REGION="${{ needs.dr-check.outputs.active_region }}"
          FAILOVER="${{ needs.dr-check.outputs.failover }}"
          STATUS="✅ SUCCESS"
          [ "${{ needs.dast.result }}" != "success" ] && STATUS="❌ FAILED"
          echo "================================"
          echo "  🛡️ DevSecOps Pipeline Summary"
          echo "================================"
          echo "  Region Active   : $REGION"
          echo "  DR Failover     : $FAILOVER"
          echo "  Health Check    : ✅ PASSED (Wajib)"
          echo "  DAST Scan       : ${{ needs.dast.result }}"
          echo "  Status          : $STATUS"
          echo "================================"
