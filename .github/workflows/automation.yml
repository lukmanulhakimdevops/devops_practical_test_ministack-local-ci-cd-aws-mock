  notify:
    name: 📢 Pipeline Summary
    runs-on: ubuntu-latest
    needs: [dr-check, traffic, dast, cleanup]
    if: always()
    steps:
      - name: 🧮 Compute Flags
        id: flags
        run: |
          if [ "${{ github.ref_name }}" = "develop" ]; then
            echo "is_dev=YES" >> $GITHUB_OUTPUT
            echo "dev_label=✅ YES (Persistent)" >> $GITHUB_OUTPUT
          else
            echo "is_dev=NO" >> $GITHUB_OUTPUT
            echo "dev_label=❌ NO" >> $GITHUB_OUTPUT
          fi

          if [ "${{ needs.dast.result }}" = "success" ]; then
            echo "status=✅ SUCCESS" >> $GITHUB_OUTPUT
          else
            echo "status=❌ FAILED" >> $GITHUB_OUTPUT
          fi

      - name: 📊 Print Summary
        run: |
          REGION="${{ needs.dr-check.outputs.active_region }}"
          FAILOVER="${{ needs.dr-check.outputs.failover }}"

          echo "================================"
          echo "  🛡️ DevSecOps Pipeline Summary"
          echo "================================"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Persistent Dev: ${{ steps.flags.outputs.dev_label }}"
          echo "  Region: $REGION"
          echo "  DR Failover: $FAILOVER"
          echo "  RDS Health: ✅ PASSED"
          echo "  App Health: ✅ PASSED"
          echo "  DAST: ${{ needs.dast.result }}"
          echo "  Status: ${{ steps.flags.outputs.status }}"
          echo "================================"
          if [ "${{ steps.flags.outputs.is_dev }}" = "YES" ]; then
            echo "💡 Environment persistent for dev iterations."
            echo "🌐 Access: http://localhost:${{ env.HOST_PORT }}"
          fi
