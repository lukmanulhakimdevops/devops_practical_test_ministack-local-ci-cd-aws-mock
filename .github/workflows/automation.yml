name: 🛡️ Enterprise DevSecOps CI/CD (Bare-Metal Optimized)

on:
  push:
    branches: [main, develop]
    paths:
      - 'TodoWebAPI/**'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]
      manual_dr_trigger:
        description: 'Force execution to Laptop (us-east-2)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

env:
  DOTNET_VERSION: '8.0.x'
  APP_DLL: TodoWebAPI.dll
  APP_NAME: todo-webapi
  CONTAINER_NAME: todo-webapi
  HOST_PORT: 8080
  CONTAINER_PORT: 5000

permissions:
  contents: read
  security-events: write
  actions: read
  checks: write

jobs:
  # ==========================================
  # [ROUTING & RUNNER DECISION]
  # ==========================================
  dr-check:
    name: 🧠 Runner Decision
    runs-on: ubuntu-latest
    outputs:
      active_region: ${{ steps.set.outputs.region }}
      runner_label: ${{ steps.set.outputs.runner }}
      ministack_port: ${{ steps.set.outputs.port }}
      failover: ${{ steps.set.outputs.failover }}
      state_prefix: ${{ steps.set.outputs.state_prefix }}
    steps:
      - id: set
        env:
          FAIL: ${{ github.event.inputs.manual_dr_trigger }}
        run: |
          if [ "$FAIL" == "true" ]; then
            echo 'runner=["self-hosted", "linux", "x64"]' >> $GITHUB_OUTPUT
            echo "region=us-east-2" >> $GITHUB_OUTPUT
            echo "port=4566" >> $GITHUB_OUTPUT
            echo "state_prefix=ministack/us-east-2" >> $GITHUB_OUTPUT
            echo "failover=true" >> $GITHUB_OUTPUT
          else
            echo 'runner="ubuntu-latest"' >> $GITHUB_OUTPUT
            echo "region=us-east-1" >> $GITHUB_OUTPUT
            echo "port=4566" >> $GITHUB_OUTPUT
            echo "state_prefix=ministack/us-east-1" >> $GITHUB_OUTPUT
            echo "failover=false" >> $GITHUB_OUTPUT
          fi

  # ==========================================
  # [BUILD & COMPILE APP]
  # ==========================================
  build:
    name: 🔨 Build Application
    runs-on: ubuntu-latest
    needs: dr-check
    steps:
      - uses: actions/checkout@v4
      - name: 🔧 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: 🔨 Build & Publish
        run: |
          dotnet restore TodoWebAPI/*.csproj
          dotnet build TodoWebAPI/*.csproj -c Release --no-restore
          dotnet publish TodoWebAPI/*.csproj -c Release --no-build -o publish_output
      - name: 📤 Upload App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-binaries
          path: publish_output/
          retention-days: 1

  # ==========================================
  # [CONTAINERIZATION]
  # ==========================================
  container:
    name: 🐳 Container Build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: ⬇️ Download artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-binaries
          path: deploy/publish
      - name: 🐳 Create Dockerfile
        env:
          DOCKERFILE_CONTENT: |
            FROM mcr.microsoft.com/dotnet/aspnet:8.0-alpine
            WORKDIR /app
            ENV ASPNETCORE_ENVIRONMENT=Production
            RUN adduser -u 1000 --disabled-password --gecos "" appuser && chown -R appuser /app
            USER appuser
            EXPOSE 5000
            COPY publish/ /app/
            ENTRYPOINT ["dotnet", "TodoWebAPI.dll"]
        run: |
          mkdir -p deploy
          echo "$DOCKERFILE_CONTENT" > deploy/Dockerfile
      - name: 🏗️ Build & Save Image
        run: |
          docker build -t ${{ env.APP_NAME }}:latest ./deploy
          docker save ${{ env.APP_NAME }}:latest | gzip > ${{ env.APP_NAME }}-image.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: ${{ env.APP_NAME }}-image.tar.gz
          retention-days: 1

  # ==========================================
  # [INFRASTRUCTURE PROVISIONING (NATIVE)]
  # ==========================================
  infra:
    name: 🏗️ Provision Infra via Terraform
    runs-on: ${{ fromJSON(needs.dr-check.outputs.runner_label) }}
    needs: dr-check
    outputs:
      rds_endpoint: ${{ steps.tf.outputs.rds_endpoint }}
    steps:
      - uses: actions/checkout@v4
      
      - name: 📝 Create TF Config
        env:
          TF_CONTENT: |
            terraform { required_providers { aws = { source = "hashicorp/aws", version = "~> 5.0" } } }
            variable "ministack_endpoint" {}
            variable "aws_region" {}
            variable "environment" {}
            variable "db_name" {}
            variable "db_user" {}
            variable "db_password" {}

            provider "aws" {
              region                      = var.aws_region
              access_key                  = "test"
              secret_key                  = "test"
              skip_credentials_validation = true
              skip_requesting_account_id  = true
              skip_metadata_api_check     = true
              s3_use_path_style           = true
              endpoints {
                ec2 = var.ministack_endpoint
                s3  = var.ministack_endpoint
                rds = var.ministack_endpoint
              }
            }

            resource "aws_security_group" "web_sg" {
              name = "web-sg-${var.environment}-${var.aws_region}"
              tags = { Name = "web-sg-${var.environment}" }
            }

            resource "aws_instance" "web" {
              ami           = "ami-0ff8a91507f77f867"
              instance_type = "t2.micro"
              security_groups = [aws_security_group.web_sg.name]
              tags = { Name = "web-server-${var.environment}" }
            }

            resource "aws_db_instance" "mysql" {
              identifier          = "ministack-mysql-${var.environment}"
              engine              = "mysql"
              engine_version      = "8.0"
              instance_class      = "db.t3.micro"
              allocated_storage   = 20
              db_name             = var.db_name
              username            = var.db_user
              password            = var.db_password
              port                = 3306
              skip_final_snapshot = true
              apply_immediately   = true
              publicly_accessible = true
            }

            output "rds_endpoint" { value = aws_db_instance.mysql.endpoint }
        run: |
          mkdir -p terraform
          echo "$TF_CONTENT" > terraform/main.tf

      # LANGSUNG EKSEKUSI TERRAFORM (Karena di laptop lo udah ada v1.14.8)
      - name: 🗃️ Apply Terraform
        id: tf
        working-directory: terraform
        env:
          TF_VAR_ministack_endpoint: "http://localhost:${{ needs.dr-check.outputs.ministack_port }}"
          TF_VAR_aws_region: "${{ needs.dr-check.outputs.active_region }}"
          TF_VAR_environment: "${{ github.event.inputs.environment || 'staging' }}"
          TF_VAR_db_name: "${{ secrets.DB_NAME }}"
          TF_VAR_db_user: "${{ secrets.DB_USER }}"
          TF_VAR_db_password: "${{ secrets.DB_PASSWORD }}"
        run: |
          terraform init -input=false
          terraform apply -auto-approve -input=false
          echo "rds_endpoint=$(terraform output -raw rds_endpoint)" >> $GITHUB_OUTPUT

  # ==========================================
  # [DB INITIALIZATION & RECONNAISSANCE]
  # ==========================================
  db-init:
    name: 🗂️ RDS Healthcheck & DB Init
    runs-on: ${{ fromJSON(needs.dr-check.outputs.runner_label) }}
    needs: [dr-check, infra]
    steps:
      - name: 🔍 Lacak Internal IP RDS Ministack
        id: rds_recon
        run: |
          echo "Mencari kontainer MySQL bawaan Ministack..."
          sleep 10 # Tunggu engine spin-up
          MYSQL_CONTAINER=$(docker ps --format '{{.Names}}' | grep -i 'mysql' | head -n 1)
          
          if [ -z "$MYSQL_CONTAINER" ]; then
            echo "❌ Kontainer MySQL tidak ditemukan di Docker Daemon!"
            exit 1
          fi
          
          RDS_INTERNAL_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' $MYSQL_CONTAINER)
          echo "✅ Target Terkunci! Internal IP: $RDS_INTERNAL_IP"
          echo "RDS_HOST=$RDS_INTERNAL_IP" >> $GITHUB_ENV

      # LANGSUNG EKSEKUSI NATIVE MYSQL CLIENT (Karena laptop lo udah ready)
      - name: 🏥 Healthcheck & Injection
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          echo "🏥 Pinging TCP $RDS_HOST:3306..."
          READY="false"
          for i in $(seq 1 60); do
            if mysqladmin ping -h"$RDS_HOST" -P3306 -u"$DB_USER" -p"$DB_PASS" --silent 2>/dev/null; then
              echo "✅ HEALTHCHECK PASS: RDS Ministack UP."
              READY="true"
              break
            fi
            sleep 5
          done
          
          if [ "$READY" = "false" ]; then
            echo "❌ CRITICAL: RDS Healthcheck FAILED"
            exit 1
          fi

          echo "🗂️ Executing Schema..."
          cat << 'EOF' > schema.sql
          CREATE TABLE IF NOT EXISTS TodoItems (
            Id INT PRIMARY KEY AUTO_INCREMENT,
            Name VARCHAR(255) NULL,
            IsComplete TINYINT(1) NOT NULL DEFAULT 0,
            CreatedAt TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
            UpdatedAt TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
          ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
          EOF
          mysql -h"$RDS_HOST" -P3306 -u"$DB_USER" -p"$DB_PASS" "$DB_NAME" < schema.sql
          echo "✅ Schema Initialized."

  # ==========================================
  # [APPLICATION DEPLOYMENT]
  # ==========================================
  deploy:
    name: 🚀 Deploy App & Health Check
    runs-on: ${{ fromJSON(needs.dr-check.outputs.runner_label) }}
    needs: [dr-check, container, db-init]
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - name: ⬇️ Download Docker Image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: .
          
      - name: 🔍 Lacak Internal IP RDS untuk App
        run: |
          MYSQL_CONTAINER=$(docker ps --format '{{.Names}}' | grep -i 'mysql' | head -n 1)
          RDS_INTERNAL_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' $MYSQL_CONTAINER)
          echo "RDS_HOST=$RDS_INTERNAL_IP" >> $GITHUB_ENV

      - name: 📦 Load & Deploy
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          docker load < ${{ env.APP_NAME }}-image.tar.gz
          docker rm -f ${{ env.CONTAINER_NAME }} 2>/dev/null || true

          docker run -d --name ${{ env.CONTAINER_NAME }} --network host \
            -e ASPNETCORE_URLS="http://+:${{ env.HOST_PORT }}" \
            -e "ConnectionStrings__DefaultConnection=Server=$RDS_HOST;Port=3306;Database=$DB_NAME;Uid=$DB_USER;Pwd=$DB_PASS;" \
            --security-opt="no-new-privileges:true" \
            ${{ env.APP_NAME }}:latest

          echo "⏳ Polling Application Health..."
          for i in $(seq 1 20); do
            HTTP=$(curl -so /dev/null -w "%{http_code}" "http://localhost:${{ env.HOST_PORT }}/swagger/v1/swagger.json" 2>/dev/null || echo "000")
            if [ "$HTTP" == "200" ]; then
              echo "✅ APP HEALTHY (HTTP 200)"
              exit 0
            fi
            sleep 5
          done
          echo "❌ APP FAILED"
          docker logs ${{ env.CONTAINER_NAME }}
          exit 1

  # ==========================================
  # [CLEANUP ON FAILURE]
  # ==========================================
  cleanup:
    name: 🧹 Teardown (On Failure)
    runs-on: ${{ fromJSON(needs.dr-check.outputs.runner_label) }}
    needs: [dr-check, infra, deploy]
    if: failure()
    steps:
      - name: 🗑️ Wipe Failed Resources
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ needs.dr-check.outputs.active_region }}
        run: |
          PORT="${{ needs.dr-check.outputs.ministack_port }}"
          ENDPOINT="http://localhost:${PORT}"
          # Pakai AWS CLI berbasis Docker untuk cleanup (karena command aws mungkin belum disetup native)
          AWS_CMD="docker run --rm --network host -e AWS_ACCESS_KEY_ID -e AWS_SECRET_ACCESS_KEY -e AWS_DEFAULT_REGION amazon/aws-cli"
          
          echo "🧹 Stopping App Container..."
          docker rm -f ${{ env.CONTAINER_NAME }} 2>/dev/null || true
          
          echo "🗑️ Wiping Ministack EC2..."
          $AWS_CMD ec2 describe-instances --query "Reservations[*].Instances[*].InstanceId" --output text --endpoint-url "$ENDPOINT" 2>/dev/null | tr '\t' '\n' | grep -v '^$' | while read -r ID; do
            [ -n "$ID" ] && $AWS_CMD ec2 terminate-instances --instance-ids "$ID" --endpoint-url "$ENDPOINT" 2>/dev/null || true
          done
          
          echo "🗑️ Wiping Ministack RDS..."
          $AWS_CMD rds describe-db-instances --query "DBInstances[*].DBInstanceIdentifier" --output text --endpoint-url "$ENDPOINT" 2>/dev/null | tr '\t' '\n' | grep -v '^$' | while read -r DBID; do
            [ -n "$DBID" ] && $AWS_CMD rds delete-db-instance --db-instance-identifier "$DBID" --skip-final-snapshot --endpoint-url "$ENDPOINT" 2>/dev/null || true
          done
          echo "✅ Teardown Complete. Ministack Core is Safe."

  # ==========================================
  # [FINAL NOTIFICATION]
  # ==========================================
  notify:
    name: 📢 Execution Summary
    runs-on: ubuntu-latest
    needs: [dr-check, deploy]
    if: always()
    steps:
      - name: 📊 Status Report
        run: |
          echo "==========================================="
          echo "  🎯 DEVSECOPS SUMMARY (BARE-METAL OPTIMIZED)"
          echo "==========================================="
          echo "  Execution Target : ${{ needs.dr-check.outputs.runner_label }}"
          echo "  Active Region    : ${{ needs.dr-check.outputs.active_region }}"
          echo "  Deployment State : ${{ needs.deploy.result }}"
          echo "  App Access URL   : http://localhost:${{ env.HOST_PORT }}/swagger/v1/swagger.json"
          echo "==========================================="
