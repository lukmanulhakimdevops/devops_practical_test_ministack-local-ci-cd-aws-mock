name: 🛡️ Enterprise DevSecOps CI/CD (DR & Audit-Proof)

on:
  push:
    branches: [main, develop]
    paths:
      - 'TodoWebAPI/**'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]
      manual_dr_trigger:
        description: 'Force DR failover to us-east-2 (laptop)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

env:
  DOTNET_VERSION: '8.0.x'
  APP_DLL: TodoWebAPI.dll
  APP_NAME: todo-webapi
  CONTAINER_NAME: todo-webapi
  HOST_PORT: 8080
  CONTAINER_PORT: 5000
  MINISTACK_ENDPOINT: ${{ secrets.LOCALSTACK_ENDPOINT || 'http://localhost:4566' }}
  AWS_REGION_PRIMARY: us-east-1
  AWS_REGION_DR: us-east-2
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  DB_NAME: ${{ secrets.DB_NAME }}
  DB_USER: ${{ secrets.DB_USER }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET || '' }}

permissions:
  contents: read
  security-events: write
  actions: read
  checks: write

jobs:

# ==========================================
# DR DECISION
# ==========================================
  dr-check:
    runs-on: ubuntu-latest
    outputs:
      active_region: ${{ steps.set.outputs.region }}
      runner_label: ${{ steps.set.outputs.runner }}
      ministack_port: ${{ steps.set.outputs.port }}
      failover: ${{ steps.set.outputs.failover }}
      state_key_prefix: ${{ steps.set.outputs.state_prefix }}
      use_s3_backend: ${{ steps.set.outputs.use_s3_backend }}
    steps:
      - id: set
        run: |
          FAIL="${{ github.event.inputs.manual_dr_trigger }}"
          USE_S3="false"

          if [ "$FAIL" == "true" ]; then
            REGION="${{ env.AWS_REGION_DR }}"
            RUNNER="self-hosted"
            PORT="4567"
            PREFIX="ministack/us-east-2"
          else
            REGION="${{ env.AWS_REGION_PRIMARY }}"
            RUNNER="ubuntu-latest"
            PORT="4566"
            PREFIX="ministack/us-east-1"
          fi

          if [ -n "${{ env.TF_STATE_BUCKET }}" ] && [ "$RUNNER" != "self-hosted" ]; then
            USE_S3="true"
          fi

          echo "region=$REGION" >> $GITHUB_OUTPUT
          echo "runner=$RUNNER" >> $GITHUB_OUTPUT
          echo "port=$PORT" >> $GITHUB_OUTPUT
          echo "failover=$FAIL" >> $GITHUB_OUTPUT
          echo "state_prefix=$PREFIX" >> $GITHUB_OUTPUT
          echo "use_s3_backend=$USE_S3" >> $GITHUB_OUTPUT

# ==========================================
# SAST
# ==========================================
  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: gitleaks/gitleaks-action@v2

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - run: cd TodoWebAPI && dotnet build

      - uses: github/codeql-action/analyze@v3

# ==========================================
# SCA
# ==========================================
  sca:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - run: |
          dotnet restore TodoWebAPI/*.csproj
          dotnet list TodoWebAPI/*.csproj package --vulnerable --include-transitive || true

      - uses: CycloneDX/gh-dotnet-generate-sbom@v1
        with:
          path: TodoWebAPI
          output: sbom.xml

      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: TodoWebAPI/sbom.xml

# ==========================================
# BUILD
# ==========================================
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - run: |
          dotnet restore TodoWebAPI/*.csproj
          dotnet publish TodoWebAPI/*.csproj -c Release -o publish

      - uses: actions/upload-artifact@v4
        with:
          name: app
          path: publish/

# ==========================================
# CONTAINER
# ==========================================
  container:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app
          path: deploy

      - run: |
          cat > deploy/Dockerfile <<EOF
          FROM mcr.microsoft.com/dotnet/aspnet:8.0-alpine
          WORKDIR /app
          COPY . .
          ENTRYPOINT ["dotnet","TodoWebAPI.dll"]
          EOF

      - run: docker build -t app:latest deploy

      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: app:latest
          exit-code: '1'

      - run: docker save app:latest | gzip > image.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: image
          path: image.tar.gz

# ==========================================
# DEPLOY
# ==========================================
  deploy:
    runs-on: ubuntu-latest
    needs: [container]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: image

      - run: docker load < image.tar.gz

      - run: |
          docker rm -f app || true
          docker run -d -p 8080:5000 app:latest

      - run: |
          for i in {1..10}; do
            curl -f http://localhost:8080 && exit 0
            sleep 3
          done
          exit 1

# ==========================================
# DAST
# ==========================================
  dast:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - run: |
          docker run --rm --network host ghcr.io/zaproxy/zaproxy zap-baseline.py -t http://localhost:8080 -l FAIL

# ==========================================
# TRAFFIC
# ==========================================
  traffic:
    runs-on: ubuntu-latest
    needs: [dr-check, deploy, dast]
    steps:
      - run: |
          echo "Region: ${{ needs.dr-check.outputs.active_region }}"
          echo "Failover: ${{ needs.dr-check.outputs.failover }}"

# ==========================================
# CLEANUP (FIXED)
# ==========================================
  cleanup:
    runs-on: ubuntu-latest
    needs: [traffic, dast]
    if: >
      always() &&
      github.ref_name != 'develop'
    steps:
      - run: |
          docker rm -f app || true
          docker system prune -f || true

# ==========================================
# SUMMARY
# ==========================================
  notify:
    runs-on: ubuntu-latest
    needs: [cleanup]
    if: always()
    steps:
      - run: echo "Pipeline finished"
