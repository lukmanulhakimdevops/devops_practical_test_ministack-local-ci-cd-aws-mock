name: 🛡️ DevSecOps with RDS Mock + EC2 Mock + DAST

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION:            us-east-1
  AWS_ACCESS_KEY_ID:     dummy
  AWS_SECRET_ACCESS_KEY: dummy
  LOCALSTACK_ENDPOINT:   http://localhost:4566

  APP_DLL:               TodoWebAPI.dll
  APP_NAME:              todo-webapi
  HOST_PORT:             8080
  CONTAINER_PORT:        5000

  DB_NAME:               MyWebApiDB
  DB_USER:               tempAdmin
  DB_PASSWORD:           !tempAdmin954*

jobs:
  build:
    name: Build and Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build & Publish
        run: |
          dotnet restore TodoWebAPI/*.csproj
          dotnet publish TodoWebAPI/*.csproj -c Release -o publish_output
      - name: Zip artifact
        run: |
          cd publish_output
          zip -r ../webapp-binaries.zip .
          cd ..
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-binaries
          path: webapp-binaries.zip

  deploy_ec2_mock_with_rds:
    name: Deploy to EC2 Mock + RDS Mock + DAST
    needs: build
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Start LocalStack (RDS mock)
        run: |
          docker rm -f localstack 2>/dev/null || true
          docker run -d --name localstack -p 4566:4566 -e SERVICES=rds,s3 localstack/localstack:latest
          sleep 10

      - name: Create RDS instance in LocalStack
        run: |
          aws --endpoint-url=http://localhost:4566 rds create-db-instance \
            --db-instance-identifier mock-mysql \
            --db-instance-class db.t3.micro \
            --engine mysql \
            --master-username ${DB_USER} \
            --master-user-password "${DB_PASSWORD}" \
            --allocated-storage 20 \
            --db-name ${DB_NAME} \
            --port 3306 \
            --region us-east-1 || true
          # Tidak perlu menunggu, mock langsung siap

      - name: Clean old EC2 mock container
        run: docker rm -f ec2-mock 2>/dev/null || true

      - name: Start EC2 mock container with network host
        run: |
          docker run -d \
            --name ec2-mock \
            --privileged \
            --network host \
            -v /var/run/docker.sock:/var/run/docker.sock \
            amazonlinux:2 \
            /bin/bash -c "
              yum update -y && \
              yum install -y docker openssh-server unzip curl && \
              service docker start && \
              usermod -a -G docker ec2-user && \
              /usr/sbin/sshd -D
            "
          sleep 15

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-binaries
          path: ./artifact

      - name: Copy artifact to EC2 mock
        run: |
          docker cp ./artifact/webapp-binaries.zip ec2-mock:/tmp/
          docker exec ec2-mock bash -c "
            mkdir -p /home/ec2-user/app && \
            cd /home/ec2-user/app && \
            unzip -q /tmp/webapp-binaries.zip
          "

      - name: Build and run app container inside EC2 mock (connect to RDS mock on host)
        run: |
          # Karena EC2 mock menggunakan --network host, maka localhost mengarah ke host
          docker exec ec2-mock bash -c "
            cd /home/ec2-user/app
            cat > Dockerfile <<'EOF'
            FROM mcr.microsoft.com/dotnet/aspnet:8.0-alpine
            WORKDIR /app
            RUN apk add --no-cache openssl curl
            RUN openssl req -x509 -newkey rsa:4096 -keyout /app/key.pem -out /app/cert.pem -days 365 -nodes -subj '/CN=localhost' \
             && openssl pkcs12 -export -out /app/aspnetapp.pfx -inkey /app/key.pem -in /app/cert.pem -passout pass:dev
            ENV ASPNETCORE_ENVIRONMENT=Development
            ENV ASPNETCORE_Kestrel__Certificates__Default__Path=/app/aspnetapp.pfx
            ENV ASPNETCORE_Kestrel__Certificates__Default__Password=dev
            RUN adduser -D appuser && chown -R appuser /app
            USER appuser
            COPY . .
            ENTRYPOINT [\"dotnet\", \"TodoWebAPI.dll\"]
            EOF
            docker build -t todo-app .
            docker rm -f todo-webapi 2>/dev/null || true
            docker run -d --name todo-webapi -p 8080:8080 \
              -e ConnectionStrings__DefaultConnection=\"Server=localhost;Port=3306;Database=${DB_NAME};Uid=${DB_USER};Pwd=${DB_PASSWORD};\" \
              --restart unless-stopped todo-app
          "

      - name: Wait for app readiness (from host via localhost:8080)
        run: |
          echo "Waiting for Swagger endpoint on http://localhost:8080/swagger/v1/swagger.json"
          for i in {1..15}; do
            if curl -sf http://localhost:8080/swagger/v1/swagger.json; then
              echo "✅ App ready inside EC2 mock"
              exit 0
            fi
            sleep 4
          done
          echo "❌ App not ready"
          docker exec ec2-mock docker logs todo-webapi
          exit 1

      - name: DAST scan (OWASP ZAP) against app running in EC2 mock
        run: |
          docker run --rm --network="host" ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://localhost:8080 -l FAIL || {
            echo "❌ DAST failed"
            exit 1
          }

      - name: Show logs
        run: |
          echo "=== App container logs ==="
          docker exec ec2-mock docker logs --tail 20 todo-webapi
