name: 🛡️ Enterprise DevSecOps CI/CD (DR & Audit-Proof)

on:
  push:
    branches: [main, develop]
    paths:
      - 'TodoWebAPI/**'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]
      manual_dr_trigger:
        description: 'Force DR failover to us-east-2 (laptop)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
      cleanup_resources:
        description: 'Cleanup after pipeline? (only for ephemeral env)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

env:
  DOTNET_VERSION: '8.0.x'
  APP_DLL: TodoWebAPI.dll
  APP_NAME: todo-webapi
  CONTAINER_NAME: todo-webapi
  HOST_PORT: 8080
  AWS_REGION_PRIMARY: us-east-1
  AWS_REGION_DR: us-east-2
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  DB_NAME: ${{ secrets.DB_NAME }}
  DB_USER: ${{ secrets.DB_USER }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  DB_PORT: ${{ secrets.DB_PORT || '3306' }}
  TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET || '' }}

permissions:
  contents: read
  security-events: write
  actions: read
  checks: write

jobs:
  # ==========================================
  # [ROUTING & DR DECISION]
  # ==========================================
  dr-check:
    name: 🧠 DR Decision
    runs-on: ubuntu-latest
    outputs:
      active_region: ${{ steps.set.outputs.region }}
      runner_label: ${{ steps.set.outputs.runner }}
      ministack_port: ${{ steps.set.outputs.port }}
      failover: ${{ steps.set.outputs.failover }}
      state_key_prefix: ${{ steps.set.outputs.state_prefix }}
      use_s3_backend: ${{ steps.set.outputs.use_s3_backend }}
      is_dr: ${{ steps.set.outputs.is_dr }}
      should_cleanup: ${{ steps.set.outputs.should_cleanup }}
    steps:
      - id: set
        run: |
          FAIL="${{ github.event.inputs.manual_dr_trigger }}"
          CLEANUP_INPUT="${{ github.event.inputs.cleanup_resources }}"
          BRANCH="${{ github.ref_name }}"

          # Cleanup hanya jika diminta atau branch bukan main/develop (untuk primary)
          SHOULD_CLEANUP="false"
          if [ "$CLEANUP_INPUT" == "true" ]; then
            SHOULD_CLEANUP="true"
          elif [ "$BRANCH" != "main" ] && [ "$BRANCH" != "develop" ]; then
            SHOULD_CLEANUP="true"
          fi
          echo "should_cleanup=$SHOULD_CLEANUP" >> $GITHUB_OUTPUT

          if [ "$FAIL" == "true" ]; then
            echo 'runner=["self-hosted","linux","x64"]' >> $GITHUB_OUTPUT
            echo "region=${{ env.AWS_REGION_DR }}"      >> $GITHUB_OUTPUT
            echo "port=4566"                            >> $GITHUB_OUTPUT
            echo "state_prefix=ministack/us-east-2"     >> $GITHUB_OUTPUT
            echo "use_s3_backend=false"                 >> $GITHUB_OUTPUT
            echo "is_dr=true"                           >> $GITHUB_OUTPUT
          else
            echo 'runner="ubuntu-latest"'               >> $GITHUB_OUTPUT
            echo "region=${{ env.AWS_REGION_PRIMARY }}" >> $GITHUB_OUTPUT
            echo "port=4566"                            >> $GITHUB_OUTPUT
            echo "state_prefix=ministack/us-east-1"     >> $GITHUB_OUTPUT
            USE_S3="false"
            [ -n "${{ env.TF_STATE_BUCKET }}" ] && USE_S3="true"
            echo "use_s3_backend=$USE_S3"               >> $GITHUB_OUTPUT
            echo "is_dr=false"                          >> $GITHUB_OUTPUT
          fi
          echo "failover=$FAIL" >> $GITHUB_OUTPUT

  # ==========================================
  # [DEV SECURITY JOBS] – ONLY ON PRIMARY
  # ==========================================
  sast:
    name: 🔐 SAST & Secrets
    runs-on: ubuntu-latest
    if: needs.dr-check.outputs.is_dr == 'false'
    needs: dr-check
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 🔐 Gitleaks – Secret Scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: 🔧 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: 🧬 Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
      - name: 🔨 Build for CodeQL
        run: cd TodoWebAPI && dotnet build TodoWebAPI.csproj
      - name: 🧬 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  sca:
    name: 📦 SCA & SBOM
    runs-on: ubuntu-latest
    if: needs.dr-check.outputs.is_dr == 'false'
    needs: dr-check
    steps:
      - uses: actions/checkout@v4
      - name: 🔧 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: 🔍 Audit NuGet vulnerabilities
        run: |
          dotnet restore TodoWebAPI/*.csproj
          dotnet list TodoWebAPI/*.csproj package --vulnerable --include-transitive || true
      - name: 📄 Generate SBOM (CycloneDX)
        uses: CycloneDX/gh-dotnet-generate-sbom@v1
        with:
          path: TodoWebAPI
          output: sbom.xml
      - name: 📤 Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: app-sbom
          path: TodoWebAPI/sbom.xml
          retention-days: 7

  build:
    name: 🔨 Build Application
    runs-on: ubuntu-latest
    if: needs.dr-check.outputs.is_dr == 'false'
    needs: dr-check
    steps:
      - uses: actions/checkout@v4
      - name: 🔧 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: 🩹 Patch Microsoft.Build vulnerability
        run: |
          for proj in TodoWebAPI/*.csproj; do
            dotnet add "$proj" package Microsoft.Build --version 17.8.43
          done
      - name: 🔨 Restore, Build & Publish
        run: |
          dotnet restore TodoWebAPI/*.csproj
          dotnet build TodoWebAPI/*.csproj -c Release --no-restore
          dotnet publish TodoWebAPI/*.csproj -c Release --no-build -o publish_output
      - name: 📤 Upload App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-binaries
          path: publish_output/
          retention-days: 1

  container:
    name: 🐳 Container Build & Scan
    runs-on: ubuntu-latest
    needs: [dr-check, build]
    if: needs.dr-check.outputs.is_dr == 'false'
    steps:
      - uses: actions/checkout@v4
      - name: ⬇️ Download artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-binaries
          path: deploy/publish
      - name: 🐳 Create hardened Dockerfile
        run: |
          cat > deploy/Dockerfile << 'DOCKERFILE'
          FROM mcr.microsoft.com/dotnet/aspnet:8.0-alpine
          WORKDIR /app
          RUN apk update && apk upgrade --no-cache \
           && apk add --no-cache openssl \
           && openssl req -x509 -newkey rsa:4096 \
                -keyout /tmp/key.pem -out /tmp/cert.pem \
                -days 365 -nodes -subj '/CN=localhost' \
           && openssl pkcs12 -export \
                -out /app/aspnetapp.pfx \
                -inkey /tmp/key.pem -in /tmp/cert.pem \
                -passout pass:devpassword \
           && rm /tmp/key.pem /tmp/cert.pem \
           && apk del openssl
          ENV ASPNETCORE_ENVIRONMENT=Production \
              ASPNETCORE_Kestrel__Certificates__Default__Path=/app/aspnetapp.pfx \
              ASPNETCORE_Kestrel__Certificates__Default__Password=devpassword
          RUN adduser -u 1000 --disabled-password --gecos "" appuser \
           && mkdir -p /app/logs \
           && chown -R appuser:appuser /app
          USER appuser
          EXPOSE 8080
          COPY --chown=appuser:appuser publish/ /app/
          ENTRYPOINT ["dotnet", "TodoWebAPI.dll"]
          DOCKERFILE
      - name: 🏗️ Build Docker Image
        run: docker build -t ${{ env.APP_NAME }}:latest ./deploy
      - name: 🛡️ Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.APP_NAME }}:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
      - name: 💾 Save Docker Image
        run: docker save ${{ env.APP_NAME }}:latest | gzip > ${{ env.APP_NAME }}-image.tar.gz
      - name: 📤 Upload Docker Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: ${{ env.APP_NAME }}-image.tar.gz
          retention-days: 1

  # ==========================================
  # [INFRASTRUCTURE PROVISIONING] – BOTH ENVS
  # ==========================================
  infra:
    name: 🏗️ Provision Infrastructure
    runs-on: ${{ fromJSON(needs.dr-check.outputs.runner_label) }}
    needs: dr-check
    outputs:
      rds_endpoint: ${{ steps.tf.outputs.rds_endpoint }}
      ec2_public_ip: ${{ steps.tf.outputs.ec2_public_ip }}
    steps:
      - uses: actions/checkout@v4

      # ---------- GitHub-hosted (us-east-1) ----------
      - name: '🔧 [GitHub] Install Terraform & Start Ministack'
        if: needs.dr-check.outputs.is_dr == 'false'
        run: |
          if ! command -v terraform &>/dev/null; then
            curl -fsSL https://apt.releases.hashicorp.com/gpg \
              | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
            echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] \
              https://apt.releases.hashicorp.com $(lsb_release -cs) main" \
              | sudo tee /etc/apt/sources.list.d/hashicorp.list
            sudo apt-get update -qq && sudo apt-get install -y terraform
          fi
          terraform version

          PORT="${{ needs.dr-check.outputs.ministack_port }}"
          docker rm -f ministack 2>/dev/null || true
          docker run -d --name ministack \
            -p ${PORT}:4566 \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -e SERVICES=ec2,s3,sts,iam,rds \
            -e DEFAULT_REGION=${{ needs.dr-check.outputs.active_region }} \
            nahuelnucera/ministack:latest

          echo "⏳ Waiting for Ministack (ec2 + s3 + rds)..."
          for i in $(seq 1 40); do
            STATUS=$(curl -sf "http://localhost:${PORT}/_localstack/health" 2>/dev/null || echo '{}')
            S3=$(echo  "$STATUS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('services',{}).get('s3',''))"  2>/dev/null)
            EC2=$(echo "$STATUS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('services',{}).get('ec2',''))" 2>/dev/null)
            RDS=$(echo "$STATUS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('services',{}).get('rds',''))" 2>/dev/null)
            if [ "$S3" == "available" ] && [ "$EC2" == "available" ] && [ "$RDS" == "available" ]; then
              echo "✅ Ministack ready — s3=$S3, ec2=$EC2, rds=$RDS"
              break
            fi
            echo "  attempt $i/40 — s3=$S3, ec2=$EC2, rds=$RDS"
            sleep 3
          done

      # ---------- Self-hosted (us-east-2) ----------
      - name: '💻 [Laptop] Verify Ministack & Terraform'
        if: needs.dr-check.outputs.is_dr == 'true'
        run: |
          echo "🔍 Verifying local environment..."
          terraform version || { echo "❌ Terraform not found"; exit 1; }

          PORT="${{ needs.dr-check.outputs.ministack_port }}"
          if ! docker ps --format '{{.Names}}' | grep -q '^ministack$'; then
            echo "❌ Ministack container not running on port $PORT"
            echo "   Please start it manually:"
            echo "   docker run -d --name ministack -p 4566:4566 -v /var/run/docker.sock:/var/run/docker.sock -e SERVICES=ec2,s3,sts,iam,rds nahuelnucera/ministack:latest"
            exit 1
          fi

          STATUS=$(curl -sf "http://localhost:${PORT}/_localstack/health" 2>/dev/null || echo '{}')
          RDS=$(echo "$STATUS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('services',{}).get('rds',''))" 2>/dev/null)
          if [ "$RDS" != "available" ]; then
            echo "⚠️ Ministack RDS service not ready. Waiting a moment..."
            sleep 10
          fi
          echo "✅ Ministack is running (port $PORT)"

      # ---------- Common: Create Terraform config ----------
      - name: 📝 Create Terraform config
        run: |
          mkdir -p terraform

          cat > terraform/main.tf << 'TFEOF'
          terraform {
            required_providers {
              aws    = { source = "hashicorp/aws",    version = "~> 5.0" }
              random = { source = "hashicorp/random", version = "~> 3.0" }
            }
          }
          variable "ministack_endpoint" { default = "http://localhost:PORT_PLACEHOLDER" }
          variable "environment"        { default = "staging" }
          variable "aws_region"         { default = "REGION_PLACEHOLDER" }

          provider "aws" {
            region                      = var.aws_region
            access_key                  = "ACCESS_KEY_PLACEHOLDER"
            secret_key                  = "SECRET_KEY_PLACEHOLDER"
            skip_credentials_validation = true
            skip_requesting_account_id  = true
            skip_metadata_api_check     = true
            s3_use_path_style           = true
            endpoints {
              ec2 = var.ministack_endpoint
              s3  = var.ministack_endpoint
              sts = var.ministack_endpoint
              iam = var.ministack_endpoint
              rds = var.ministack_endpoint
            }
          }

          resource "random_id" "suffix" { byte_length = 4 }

          resource "aws_security_group" "web_sg" {
            name        = "web-sg-${var.environment}-${var.aws_region}"
            description = "SG for ${var.aws_region}"
            tags = { Name = "web-sg-${var.environment}", Project = "DevSecOps", Region = var.aws_region }

            ingress {
              from_port   = 80
              to_port     = 80
              protocol    = "tcp"
              cidr_blocks = ["0.0.0.0/0"]
            }
            ingress {
              from_port   = 443
              to_port     = 443
              protocol    = "tcp"
              cidr_blocks = ["0.0.0.0/0"]
            }
            egress {
              from_port   = 0
              to_port     = 0
              protocol    = "-1"
              cidr_blocks = ["0.0.0.0/0"]
            }
          }

          resource "aws_instance" "web" {
            ami             = "ami-0ff8a91507f77f867"
            instance_type   = "t2.micro"
            security_groups = [aws_security_group.web_sg.name]
            tags = { Name = "web-server-${var.environment}", Project = "DevSecOps", Region = var.aws_region }
          }

          resource "aws_db_instance" "mysql" {
            identifier          = "ministack-mysql-${var.environment}"
            engine              = "mysql"
            engine_version      = "8.0"
            instance_class      = "db.t3.micro"
            allocated_storage   = 20
            db_name             = "DBNAME_PLACEHOLDER"
            username            = "DBUSER_PLACEHOLDER"
            password            = "DBPASS_PLACEHOLDER"
            port                = 3306
            skip_final_snapshot = true
            apply_immediately   = true
            publicly_accessible = true
            tags = { Project = "DevSecOps", Region = var.aws_region }
          }

          output "rds_endpoint"  { value = aws_db_instance.mysql.endpoint }
          output "ec2_public_ip" { value = aws_instance.web.public_ip }
          TFEOF

          sed -i "s|PORT_PLACEHOLDER|${{ needs.dr-check.outputs.ministack_port }}|g"    terraform/main.tf
          sed -i "s|REGION_PLACEHOLDER|${{ needs.dr-check.outputs.active_region }}|g"   terraform/main.tf
          sed -i "s|ACCESS_KEY_PLACEHOLDER|${{ secrets.AWS_ACCESS_KEY_ID }}|g"          terraform/main.tf
          sed -i "s|SECRET_KEY_PLACEHOLDER|${{ secrets.AWS_SECRET_ACCESS_KEY }}|g"      terraform/main.tf
          sed -i "s|DBNAME_PLACEHOLDER|${{ secrets.DB_NAME }}|g"                        terraform/main.tf
          sed -i "s|DBUSER_PLACEHOLDER|${{ secrets.DB_USER }}|g"                        terraform/main.tf
          sed -i "s|DBPASS_PLACEHOLDER|${{ secrets.DB_PASSWORD }}|g"                    terraform/main.tf

          if [ "${{ needs.dr-check.outputs.use_s3_backend }}" == "true" ]; then
            cat > terraform/backend.tf << EOF
          terraform {
            backend "s3" {
              bucket  = "${{ env.TF_STATE_BUCKET }}"
              key     = "${{ needs.dr-check.outputs.state_key_prefix }}/${{ github.event.inputs.environment || 'staging' }}/terraform.tfstate"
              region  = "us-east-1"
              encrypt = true
            }
          }
          EOF
          fi

      - name: 🗃️ Init, Validate & Apply Terraform
        id: tf
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_STATE_ACCESS_KEY || secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_STATE_SECRET_KEY || secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          if [ "${{ needs.dr-check.outputs.use_s3_backend }}" == "true" ]; then
            terraform init -input=false -reconfigure -upgrade \
              -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
              -backend-config="key=${{ needs.dr-check.outputs.state_key_prefix }}/${{ github.event.inputs.environment || 'staging' }}/terraform.tfstate" \
              -backend-config="region=us-east-1" \
              -backend-config="encrypt=true"
          else
            terraform init -input=false -reconfigure -upgrade
          fi

          terraform validate
          terraform apply -auto-approve -input=false \
            -var="environment=${{ github.event.inputs.environment || 'staging' }}" \
            -var="aws_region=${{ needs.dr-check.outputs.active_region }}"

          echo "rds_endpoint=$(terraform output -raw rds_endpoint)"   >> $GITHUB_OUTPUT
          echo "ec2_public_ip=$(terraform output -raw ec2_public_ip)" >> $GITHUB_OUTPUT

  # ==========================================
  # [RDS HEALTHCHECK & DB INIT] – BOTH ENVS
  # ==========================================
  db-init:
    name: 🗂️ RDS Healthcheck & DB Init
    runs-on: ${{ fromJSON(needs.dr-check.outputs.runner_label) }}
    needs: [dr-check, infra]
    steps:
      - name: Parse RDS Endpoint
        id: parse
        run: |
          RDS_ENDPOINT="${{ needs.infra.outputs.rds_endpoint }}"
          if [[ "$RDS_ENDPOINT" == *":"* ]]; then
            RDS_HOST="${RDS_ENDPOINT%:*}"
            RDS_PORT="${RDS_ENDPOINT##*:}"
          else
            RDS_HOST="$RDS_ENDPOINT"
            RDS_PORT="3306"
          fi
          [ "$RDS_HOST" = "localhost" ] && RDS_HOST="127.0.0.1"
          echo "RDS_HOST=$RDS_HOST" >> $GITHUB_ENV
          echo "RDS_PORT=$RDS_PORT" >> $GITHUB_ENV
          echo "RDS endpoint parsed: $RDS_HOST:$RDS_PORT"

      - name: '🏥 [GitHub] Ensure Ministack & RDS'
        if: needs.dr-check.outputs.is_dr == 'false'
        run: |
          PORT="${{ needs.dr-check.outputs.ministack_port }}"
          if ! docker ps --format '{{.Names}}' | grep -q '^ministack$'; then
            echo "⚠️ Ministack tidak ditemukan, restart..."
            docker rm -f ministack 2>/dev/null || true
            docker run -d --name ministack \
              -p ${PORT}:4566 \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -e SERVICES=ec2,s3,sts,iam,rds \
              -e DEFAULT_REGION=${{ needs.dr-check.outputs.active_region }} \
              nahuelnucera/ministack:latest

            for i in $(seq 1 40); do
              STATUS=$(curl -sf "http://localhost:${PORT}/_localstack/health" 2>/dev/null || echo '{}')
              RDS=$(echo "$STATUS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('services',{}).get('rds',''))" 2>/dev/null)
              [ "$RDS" == "available" ] && { echo "✅ Ministack RDS ready"; break; }
              sleep 3
            done

            docker run --rm --network host \
              -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
              -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
              -e AWS_DEFAULT_REGION=${{ needs.dr-check.outputs.active_region }} \
              amazon/aws-cli rds create-db-instance \
                --db-instance-identifier "ministack-mysql-${{ github.event.inputs.environment || 'staging' }}" \
                --db-instance-class db.t3.micro \
                --engine mysql \
                --engine-version "8.0" \
                --master-username "${{ env.DB_USER }}" \
                --master-user-password "${{ env.DB_PASSWORD }}" \
                --db-name "${{ env.DB_NAME }}" \
                --allocated-storage 20 \
                --no-multi-az \
                --publicly-accessible \
                --no-deletion-protection \
                --endpoint-url "http://localhost:${PORT}" 2>/dev/null || true

            RDS_ENDPOINT=$(docker run --rm --network host \
              -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
              -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
              -e AWS_DEFAULT_REGION=${{ needs.dr-check.outputs.active_region }} \
              amazon/aws-cli rds describe-db-instances \
                --db-instance-identifier "ministack-mysql-${{ github.event.inputs.environment || 'staging' }}" \
                --query "DBInstances[0].Endpoint.Address" \
                --output text \
                --endpoint-url "http://localhost:${PORT}" 2>/dev/null || echo "127.0.0.1")
            if [[ "$RDS_ENDPOINT" == *":"* ]]; then
              RDS_HOST="${RDS_ENDPOINT%:*}"
              RDS_PORT="${RDS_ENDPOINT##*:}"
            else
              RDS_HOST="$RDS_ENDPOINT"
              RDS_PORT="3306"
            fi
            [ "$RDS_HOST" = "localhost" ] && RDS_HOST="127.0.0.1"
            echo "RDS_HOST=$RDS_HOST" >> $GITHUB_ENV
            echo "RDS_PORT=$RDS_PORT" >> $GITHUB_ENV
          fi

          echo "🏥 Healthcheck TCP $RDS_HOST:$RDS_PORT..."
          for i in $(seq 1 60); do
            if docker run --rm --network host mysql:8.0 \
              mysqladmin ping -h"$RDS_HOST" -P"$RDS_PORT" \
              -u"${{ env.DB_USER }}" -p"${{ env.DB_PASSWORD }}" --silent 2>/dev/null; then
              echo "✅ HEALTHCHECK PASS (attempt $i)"
              exit 0
            fi
            echo "  attempt $i/60"
            sleep 5
          done
          echo "❌ CRITICAL: RDS Healthcheck FAILED"
          exit 1

      - name: '🏥 [Laptop] RDS Health Check'
        if: needs.dr-check.outputs.is_dr == 'true'
        run: |
          echo "🏥 Checking RDS at $RDS_HOST:$RDS_PORT ..."
          for i in $(seq 1 30); do
            if docker run --rm --network host mysql:8.0 \
              mysqladmin ping -h"$RDS_HOST" -P"$RDS_PORT" \
              -u"${{ env.DB_USER }}" -p"${{ env.DB_PASSWORD }}" --silent 2>/dev/null; then
              echo "✅ RDS is healthy (attempt $i)"
              break
            fi
            sleep 2
          done

      - name: '🗂️ Database Schema Initialization'
        run: |
          docker run -i --rm --network host mysql:8.0 \
            mysql -h"$RDS_HOST" -P"$RDS_PORT" \
            -u"${{ env.DB_USER }}" -p"${{ env.DB_PASSWORD }}" "${{ env.DB_NAME }}" << 'SQL'
          CREATE TABLE IF NOT EXISTS TodoItems (
            Id         INT          PRIMARY KEY AUTO_INCREMENT,
            Name       VARCHAR(255) NULL,
            IsComplete TINYINT(1)   NOT NULL DEFAULT 0,
            CreatedAt  TIMESTAMP    DEFAULT CURRENT_TIMESTAMP,
            UpdatedAt  TIMESTAMP    DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
          ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
          SQL
          echo "✅ Database schema initialized in ${{ needs.dr-check.outputs.active_region }}"

  # ==========================================
  # [DEPLOYMENT] – BOTH ENVS (WAJIB ARTIFACT)
  # ==========================================
  deploy:
    name: 🚀 Deploy & Health Check
    runs-on: ${{ fromJSON(needs.dr-check.outputs.runner_label) }}
    needs: [dr-check, sast, sca, container, db-init, infra]
    if: |
      always() &&
      (needs.dr-check.outputs.is_dr == 'true' || 
       (needs.sast.result == 'success' && needs.sca.result == 'success' && needs.container.result == 'success'))
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - name: ⬇️ Download Docker Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: .

      - name: 📦 Load Golden Image
        run: |
          docker load < ${{ env.APP_NAME }}-image.tar.gz
          echo "✅ Golden Image Loaded."

      - name: Parse RDS Endpoint
        id: parse
        run: |
          RDS_ENDPOINT="${{ needs.infra.outputs.rds_endpoint }}"
          if [[ "$RDS_ENDPOINT" == *":"* ]]; then
            RDS_HOST="${RDS_ENDPOINT%:*}"
            RDS_PORT="${RDS_ENDPOINT##*:}"
          else
            RDS_HOST="$RDS_ENDPOINT"
            RDS_PORT="3306"
          fi
          [ "$RDS_HOST" = "localhost" ] && RDS_HOST="127.0.0.1"
          echo "RDS_HOST=$RDS_HOST" >> $GITHUB_ENV
          echo "RDS_PORT=$RDS_PORT" >> $GITHUB_ENV

      - name: '🐳 [GitHub] Ensure Ministack + RDS'
        if: needs.dr-check.outputs.is_dr == 'false'
        run: |
          PORT="${{ needs.dr-check.outputs.ministack_port }}"
          if ! docker ps --format '{{.Names}}' | grep -q '^ministack$'; then
            echo "⚠️ Ministack tidak ada, restart idempotent..."
            docker rm -f ministack 2>/dev/null || true
            docker run -d --name ministack \
              -p ${PORT}:4566 \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -e SERVICES=ec2,s3,sts,iam,rds \
              -e DEFAULT_REGION=${{ needs.dr-check.outputs.active_region }} \
              nahuelnucera/ministack:latest

            for i in $(seq 1 40); do
              STATUS=$(curl -sf "http://localhost:${PORT}/_localstack/health" 2>/dev/null || echo '{}')
              RDS=$(echo "$STATUS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('services',{}).get('rds',''))" 2>/dev/null)
              [ "$RDS" == "available" ] && { echo "✅ RDS service ready"; break; }
              sleep 3
            done

            docker run --rm --network host \
              -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
              -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
              -e AWS_DEFAULT_REGION=${{ needs.dr-check.outputs.active_region }} \
              amazon/aws-cli rds create-db-instance \
                --db-instance-identifier "ministack-mysql-${{ github.event.inputs.environment || 'staging' }}" \
                --db-instance-class db.t3.micro \
                --engine mysql \
                --engine-version "8.0" \
                --master-username "${{ env.DB_USER }}" \
                --master-user-password "${{ env.DB_PASSWORD }}" \
                --db-name "${{ env.DB_NAME }}" \
                --allocated-storage 20 \
                --no-multi-az \
                --publicly-accessible \
                --no-deletion-protection \
                --endpoint-url "http://localhost:${PORT}" 2>/dev/null || true

            RDS_ENDPOINT=$(docker run --rm --network host \
              -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
              -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
              -e AWS_DEFAULT_REGION=${{ needs.dr-check.outputs.active_region }} \
              amazon/aws-cli rds describe-db-instances \
                --db-instance-identifier "ministack-mysql-${{ github.event.inputs.environment || 'staging' }}" \
                --query "DBInstances[0].Endpoint.Address" \
                --output text \
                --endpoint-url "http://localhost:${PORT}" 2>/dev/null || echo "127.0.0.1")
            if [[ "$RDS_ENDPOINT" == *":"* ]]; then
              RDS_HOST="${RDS_ENDPOINT%:*}"
              RDS_PORT="${RDS_ENDPOINT##*:}"
            else
              RDS_HOST="$RDS_ENDPOINT"
              RDS_PORT="3306"
            fi
            [ "$RDS_HOST" = "localhost" ] && RDS_HOST="127.0.0.1"
            echo "RDS_HOST=$RDS_HOST" >> $GITHUB_ENV
            echo "RDS_PORT=$RDS_PORT" >> $GITHUB_ENV
          fi

      - name: 🗂️ Ensure DB Schema (Idempotent)
        run: |
          docker run -i --rm --network host mysql:8.0 \
            mysql -h"$RDS_HOST" -P"$RDS_PORT" \
            -u"${{ env.DB_USER }}" -p"${{ env.DB_PASSWORD }}" "${{ env.DB_NAME }}" << 'SQL'
          CREATE TABLE IF NOT EXISTS TodoItems (
            Id         INT          PRIMARY KEY AUTO_INCREMENT,
            Name       VARCHAR(255) NULL,
            IsComplete TINYINT(1)   NOT NULL DEFAULT 0,
            CreatedAt  TIMESTAMP    DEFAULT CURRENT_TIMESTAMP,
            UpdatedAt  TIMESTAMP    DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
          ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
          SQL

      - name: 🧹 Remove old container
        run: docker rm -f ${{ env.CONTAINER_NAME }} 2>/dev/null || true

      - name: 🚀 Run container
        run: |
          docker run -d --name ${{ env.CONTAINER_NAME }} --network host \
            -e ASPNETCORE_URLS="http://+:${{ env.HOST_PORT }}" \
            -e "ConnectionStrings__DefaultConnection=Server=$RDS_HOST;Port=$RDS_PORT;Database=${{ env.DB_NAME }};Uid=${{ env.DB_USER }};Pwd=${{ env.DB_PASSWORD }};AllowPublicKeyRetrieval=true;" \
            --security-opt="no-new-privileges:true" \
            --read-only \
            --tmpfs /tmp:rw,noexec,nosuid,size=64m \
            --tmpfs /app/logs:rw,noexec,nosuid,size=32m \
            ${{ env.APP_NAME }}:latest

      - name: 🔍 WAJIB Health Check Aplikasi
        run: |
          HEALTH_URL="http://localhost:${{ env.HOST_PORT }}/swagger/v1/swagger.json"
          echo "⏳ Polling $HEALTH_URL..."
          for i in $(seq 1 20); do
            HTTP=$(curl -so /dev/null -w "%{http_code}" "$HEALTH_URL" 2>/dev/null || echo "000")
            if [ "$HTTP" == "200" ]; then
              echo "✅ HEALTH CHECK PASSED (HTTP $HTTP)"
              exit 0
            fi
            echo "  attempt $i/20 — HTTP $HTTP"
            sleep 5
          done
          echo "❌ HEALTH CHECK FAILED"
          docker logs --tail 50 ${{ env.CONTAINER_NAME }}
          exit 1

  # ==========================================
  # [DAST SCAN] – ONLY PRIMARY
  # ==========================================
  dast:
    name: 🕷️ DAST Scan
    runs-on: ubuntu-latest
    if: needs.dr-check.outputs.is_dr == 'false'
    needs: [dr-check, deploy]
    steps:
      - name: ⬇️ Download Docker Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: .

      - name: 🐳 Start Ministack & RDS for DAST
        run: |
          PORT="4566"
          docker rm -f ministack 2>/dev/null || true
          docker run -d --name ministack \
            -p ${PORT}:4566 \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -e SERVICES=ec2,s3,sts,iam,rds \
            -e DEFAULT_REGION=us-east-1 \
            nahuelnucera/ministack:latest

          for i in $(seq 1 30); do
            curl -sf "http://localhost:${PORT}/_localstack/health" && break
            sleep 2
          done

          docker run --rm --network host \
            -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            -e AWS_DEFAULT_REGION=us-east-1 \
            amazon/aws-cli rds create-db-instance \
              --db-instance-identifier "ministack-mysql-${{ github.event.inputs.environment || 'staging' }}" \
              --db-instance-class db.t3.micro \
              --engine mysql \
              --engine-version "8.0" \
              --master-username "${{ env.DB_USER }}" \
              --master-user-password "${{ env.DB_PASSWORD }}" \
              --db-name "${{ env.DB_NAME }}" \
              --allocated-storage 20 \
              --no-multi-az \
              --publicly-accessible \
              --no-deletion-protection \
              --endpoint-url "http://localhost:${PORT}" 2>/dev/null || true

          RDS_ENDPOINT=$(docker run --rm --network host \
            -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            -e AWS_DEFAULT_REGION=us-east-1 \
            amazon/aws-cli rds describe-db-instances \
              --db-instance-identifier "ministack-mysql-${{ github.event.inputs.environment || 'staging' }}" \
              --query "DBInstances[0].Endpoint.Address" \
              --output text \
              --endpoint-url "http://localhost:${PORT}" 2>/dev/null || echo "127.0.0.1")
          if [[ "$RDS_ENDPOINT" == *":"* ]]; then
            RDS_HOST="${RDS_ENDPOINT%:*}"
            RDS_PORT="${RDS_ENDPOINT##*:}"
          else
            RDS_HOST="$RDS_ENDPOINT"
            RDS_PORT="3306"
          fi
          [ "$RDS_HOST" = "localhost" ] && RDS_HOST="127.0.0.1"
          echo "RDS_HOST=$RDS_HOST" >> $GITHUB_ENV
          echo "RDS_PORT=$RDS_PORT" >> $GITHUB_ENV

          docker run -i --rm --network host mysql:8.0 \
            mysql -h"$RDS_HOST" -P"$RDS_PORT" \
            -u"${{ env.DB_USER }}" -p"${{ env.DB_PASSWORD }}" "${{ env.DB_NAME }}" << 'SQL'
          CREATE TABLE IF NOT EXISTS TodoItems (
            Id         INT          PRIMARY KEY AUTO_INCREMENT,
            Name       VARCHAR(255) NULL,
            IsComplete TINYINT(1)   NOT NULL DEFAULT 0,
            CreatedAt  TIMESTAMP    DEFAULT CURRENT_TIMESTAMP,
            UpdatedAt  TIMESTAMP    DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
          ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
          SQL

      - name: 🚀 Run App Container for DAST
        run: |
          docker load < ${{ env.APP_NAME }}-image.tar.gz
          docker rm -f ${{ env.CONTAINER_NAME }} 2>/dev/null || true
          docker run -d --name ${{ env.CONTAINER_NAME }} --network host \
            -e ASPNETCORE_URLS="http://+:${{ env.HOST_PORT }}" \
            -e "ConnectionStrings__DefaultConnection=Server=$RDS_HOST;Port=$RDS_PORT;Database=${{ env.DB_NAME }};Uid=${{ env.DB_USER }};Pwd=${{ env.DB_PASSWORD }};AllowPublicKeyRetrieval=true;" \
            --security-opt="no-new-privileges:true" \
            --read-only \
            --tmpfs /tmp:rw,noexec,nosuid,size=64m \
            --tmpfs /app/logs:rw,noexec,nosuid,size=32m \
            ${{ env.APP_NAME }}:latest

          for i in $(seq 1 20); do
            HTTP=$(curl -so /dev/null -w "%{http_code}" "http://localhost:${{ env.HOST_PORT }}/swagger/v1/swagger.json" 2>/dev/null || echo "000")
            [ "$HTTP" == "200" ] && { echo "✅ App ready"; break; }
            sleep 5
          done

      - name: 🕷️ Run ZAP baseline scan
        run: |
          mkdir -p /tmp/zap-out
          docker run --rm --network host \
            -v /tmp/zap-out:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t "http://localhost:${{ env.HOST_PORT }}" \
              -r zap-report.html \
              -J zap-report.json \
              -l FAIL \
          || { echo "❌ DAST failed"; exit 1; }
          echo "✅ DAST passed"

      - name: 📤 Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: /tmp/zap-out/
          retention-days: 7

      - name: 🧹 Cleanup DAST containers
        if: always()
        run: |
          docker rm -f ${{ env.CONTAINER_NAME }} 2>/dev/null || true
          docker rm -f ministack 2>/dev/null || true

  # ==========================================
  # [TRAFFIC STATUS]
  # ==========================================
  traffic:
    name: 🌐 Traffic Status
    runs-on: ubuntu-latest
    needs: [dr-check, deploy, dast]
    if: always() && (needs.dast.result == 'success' || needs.dast.result == 'skipped')
    steps:
      - name: 📊 Simulate Traffic Routing
        run: |
          REGION="${{ needs.dr-check.outputs.active_region }}"
          FAILOVER="${{ needs.dr-check.outputs.failover }}"
          echo "🌐 Active Region: $REGION"
          echo "🔄 DR Failover: $FAILOVER"
          echo "✅ RDS Health: PASSED"
          echo "✅ App Health: PASSED"
          if [ "$FAILOVER" == "true" ]; then
            echo "📍 Traffic: Laptop (us-east-2) via http://localhost:${{ env.HOST_PORT }}"
          else
            echo "📍 Traffic: GitHub CI Host (us-east-1) via http://localhost:${{ env.HOST_PORT }}"
            echo "✅ DAST Scan: ${{ needs.dast.result }}"
          fi

  # ==========================================
  # [OPTIONAL CLEANUP] – HANYA PRIMARY & DIMINTA
  # ==========================================
  cleanup:
    name: 🧹 Cleanup (Ephemeral)
    runs-on: ${{ fromJSON(needs.dr-check.outputs.runner_label) }}
    needs: [dr-check, traffic, dast]
    if: always() && needs.dr-check.outputs.should_cleanup == 'true' && needs.dr-check.outputs.is_dr == 'false'
    steps:
      - name: '🗑️ Cleanup GitHub Resources'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          PORT="4566"
          ENDPOINT="http://localhost:${PORT}"
          AWS="docker run --rm --network host -e AWS_ACCESS_KEY_ID -e AWS_SECRET_ACCESS_KEY -e AWS_DEFAULT_REGION amazon/aws-cli"

          echo "🧹 Stopping app container..."
          docker rm -f ${{ env.CONTAINER_NAME }} 2>/dev/null || true

          if docker ps --format '{{.Names}}' | grep -q '^ministack$'; then
            echo "🗑️ Terminating EC2 instances..."
            $AWS ec2 describe-instances \
              --filters "Name=tag:Region,Values=us-east-1" \
              --query "Reservations[*].Instances[*].InstanceId" \
              --output text --endpoint-url "$ENDPOINT" 2>/dev/null \
            | tr '\t' '\n' | grep -v '^$' | while read -r ID; do
              [ -n "$ID" ] && [ "$ID" != "None" ] && \
                $AWS ec2 terminate-instances --instance-ids "$ID" --endpoint-url "$ENDPOINT" 2>/dev/null || true
            done

            echo "🗑️ Deleting S3 buckets..."
            $AWS s3api list-buckets \
              --query "Buckets[?contains(Name,'us-east-1')].Name" \
              --output text --endpoint-url "$ENDPOINT" 2>/dev/null \
            | tr '\t' '\n' | grep -v '^$' | while read -r BUCKET; do
              [ -n "$BUCKET" ] && [ "$BUCKET" != "None" ] && {
                $AWS s3 rb "s3://$BUCKET" --force --endpoint-url "$ENDPOINT" 2>/dev/null || true
              }
            done

            echo "🗑️ Deleting RDS instance..."
            $AWS rds delete-db-instance \
              --db-instance-identifier "ministack-mysql-${{ github.event.inputs.environment || 'staging' }}" \
              --skip-final-snapshot \
              --endpoint-url "$ENDPOINT" 2>/dev/null || true
          fi

          docker rm -f ministack 2>/dev/null || true
          echo "✅ Cleanup complete."

  # ==========================================
  # [FINAL SUMMARY]
  # ==========================================
  notify:
    name: 📢 Pipeline Summary
    runs-on: ubuntu-latest
    needs: [dr-check, traffic, dast, cleanup]
    if: always()
    steps:
      - name: 📊 Print Summary
        run: |
          REGION="${{ needs.dr-check.outputs.active_region }}"
          FAILOVER="${{ needs.dr-check.outputs.failover }}"
          IS_DEV="${{ github.ref_name == 'develop' && '✅ YES (Persistent)' || '❌ NO' }}"
          STATUS="✅ SUCCESS"
          if [ "$FAILOVER" == "false" ]; then
            [ "${{ needs.dast.result }}" != "success" ] && STATUS="❌ FAILED"
          fi
          echo "================================"
          echo "  🛡️ DevSecOps Pipeline Summary"
          echo "================================"
          echo "  Branch         : ${{ github.ref_name }}"
          echo "  Persistent Dev : $IS_DEV"
          echo "  Region         : $REGION"
          echo "  DR Failover    : $FAILOVER"
          echo "  RDS Health     : ✅ PASSED"
          echo "  App Health     : ✅ PASSED"
          if [ "$FAILOVER" == "false" ]; then
            echo "  DAST           : ${{ needs.dast.result }}"
          else
            echo "  DAST           : ⏭️ SKIPPED (DR Mode)"
          fi
          if [ "${{ needs.dr-check.outputs.should_cleanup }}" == "true" ]; then
            echo "  Cleanup        : ✅ Done"
          else
            echo "  Cleanup        : ⏭️ Skipped (app kept alive)"
          fi
          echo "  Status         : $STATUS"
          echo "================================"
          if [ "$FAILOVER" == "true" ]; then
            echo "🌍 App URL: http://localhost:${{ env.HOST_PORT }} (Laptop)"
          else
            echo "🌍 App URL: http://localhost:${{ env.HOST_PORT }} (GitHub Runner - temporary)"
          fi
