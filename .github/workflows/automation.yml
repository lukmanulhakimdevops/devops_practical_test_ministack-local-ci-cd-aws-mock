name: ЁЯЫбя╕П Enterprise DevSecOps CI/CD (DR & Audit-Proof)

on:
  push:
    branches: [main, develop]
    paths:
      - 'TodoWebAPI/**'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]
      manual_dr_trigger:
        description: 'Force DR failover to us-east-2 (laptop)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

env:
  DOTNET_VERSION: '8.0.x'
  APP_DLL: TodoWebAPI.dll
  APP_NAME: todo-webapi
  CONTAINER_NAME: todo-webapi
  HOST_PORT: 8080
  CONTAINER_PORT: 5000
  MINISTACK_ENDPOINT: ${{ secrets.LOCALSTACK_ENDPOINT || 'http://localhost:4566' }}
  AWS_REGION_PRIMARY: us-east-1
  AWS_REGION_DR: us-east-2
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  DB_NAME: ${{ secrets.DB_NAME }}
  DB_USER: ${{ secrets.DB_USER }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET || '' }}

permissions:
  contents: read
  security-events: write
  actions: read
  checks: write

jobs:
  # ==========================================
  # [PARALLEL TRACK 1] ROUTING & DR LOGIC
  # ==========================================
  dr-check:
    name: ЁЯза DR Decision
    runs-on: ubuntu-latest
    outputs:
      active_region: ${{ steps.set.outputs.region }}
      runner_label: ${{ steps.set.outputs.runner }}
      ministack_port: ${{ steps.set.outputs.port }}
      failover: ${{ steps.set.outputs.failover }}
      state_key_prefix: ${{ steps.set.outputs.state_prefix }}
      use_s3_backend: ${{ steps.set.outputs.use_s3_backend }}
    steps:
      - id: set
        run: |
          FAIL="${{ github.event.inputs.manual_dr_trigger }}"
          USE_S3="false"
          if [ "$FAIL" == "true" ]; then
            REGION="${{ env.AWS_REGION_DR }}"
            RUNNER="self-hosted"
            PORT="4567"
            PREFIX="ministack/us-east-2"
          else
            REGION="${{ env.AWS_REGION_PRIMARY }}"
            RUNNER="ubuntu-latest"
            PORT="4566"
            PREFIX="ministack/us-east-1"
          fi
          if [ -n "${{ env.TF_STATE_BUCKET }}" ] && [ "$RUNNER" != "self-hosted" ]; then
            USE_S3="true"
          fi
          echo "region=$REGION" >> $GITHUB_OUTPUT
          echo "runner=$RUNNER" >> $GITHUB_OUTPUT
          echo "port=$PORT" >> $GITHUB_OUTPUT
          echo "failover=$FAIL" >> $GITHUB_OUTPUT
          echo "state_prefix=$PREFIX" >> $GITHUB_OUTPUT
          echo "use_s3_backend=$USE_S3" >> $GITHUB_OUTPUT

  # ==========================================
  # [PARALLEL TRACK 2] SECURITY SAST
  # ==========================================
  sast:
    name: ЁЯФР SAST & Secrets
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: ЁЯФР Gitleaks тАУ Secret Scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: ЁЯФз Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: ЁЯзм Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
      - name: ЁЯФи Build for CodeQL
        run: cd TodoWebAPI && dotnet build TodoWebAPI.csproj
      - name: ЁЯзм Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ==========================================
  # [PARALLEL TRACK 3] SECURITY SCA
  # ==========================================
  sca:
    name: ЁЯУж SCA & SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ЁЯФз Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: ЁЯФН Audit NuGet vulnerabilities
        run: |
          dotnet restore TodoWebAPI/*.csproj
          dotnet list TodoWebAPI/*.csproj package --vulnerable --include-transitive || true
      - name: ЁЯУД Generate SBOM (CycloneDX)
        uses: CycloneDX/gh-dotnet-generate-sbom@v1
        with:
          path: TodoWebAPI
          output: sbom.xml
      - name: ЁЯУд Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: app-sbom
          path: TodoWebAPI/sbom.xml
          retention-days: 7

  # ==========================================
  # [PARALLEL TRACK 4] BUILD APPLICATION
  # ==========================================
  build:
    name: ЁЯФи Build Application
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ЁЯФз Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: ЁЯй╣ Patch Microsoft.Build vulnerability
        run: |
          for proj in TodoWebAPI/*.csproj; do
            dotnet add "$proj" package Microsoft.Build --version 17.8.43
          done
      - name: ЁЯФи Restore, Build & Publish
        run: |
          dotnet restore TodoWebAPI/*.csproj
          dotnet build TodoWebAPI/*.csproj -c Release --no-restore
          dotnet publish TodoWebAPI/*.csproj -c Release --no-build -o publish_output
      - name: ЁЯУд Upload App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-binaries
          path: publish_output/
          retention-days: 1

  # ==========================================
  # [SUB-TRACK 4.1] CONTAINER BUILD
  # ==========================================
  container:
    name: ЁЯР│ Container Build & Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: тмЗя╕П Download artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-binaries
          path: deploy/publish
      - name: ЁЯР│ Create hardened Dockerfile
        run: |
          cat > deploy/Dockerfile <<'DOCKERFILE'
          FROM mcr.microsoft.com/dotnet/aspnet:8.0-alpine
          WORKDIR /app
          RUN apk update && apk upgrade --no-cache && apk add --no-cache openssl
          RUN openssl req -x509 -newkey rsa:4096 -keyout /app/https-key.pem -out /app/https-cert.pem -days 365 -nodes -subj '/CN=localhost' && openssl pkcs12 -export -out /app/aspnetapp.pfx -inkey /app/https-key.pem -in /app/https-cert.pem -passout pass:devpassword && rm /app/https-key.pem /app/https-cert.pem && apk del openssl
          ENV ASPNETCORE_ENVIRONMENT=Production
          ENV ASPNETCORE_Kestrel__Certificates__Default__Path=/app/aspnetapp.pfx
          ENV ASPNETCORE_Kestrel__Certificates__Default__Password=devpassword
          RUN adduser -u 1000 --disabled-password --gecos "" appuser && chown -R appuser /app
          USER appuser
          EXPOSE 5000 5001
          COPY publish/ /app/
          ENTRYPOINT ["dotnet", "TodoWebAPI.dll"]
          DOCKERFILE
      - name: ЁЯПЧя╕П Build Docker Image
        run: docker build -t ${{ env.APP_NAME }}:latest ./deploy
      - name: ЁЯЫбя╕П Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.APP_NAME }}:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
      - name: ЁЯТ╛ Save Docker Image
        run: docker save ${{ env.APP_NAME }}:latest | gzip > ${{ env.APP_NAME }}-image.tar.gz
      - name: ЁЯУд Upload Docker Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: ${{ env.APP_NAME }}-image.tar.gz
          retention-days: 1

  # ==========================================
  # [PARALLEL TRACK 5] MOCK INFRASTRUCTURE
  # ==========================================
  infra:
    name: ЁЯПЧя╕П Provision Infrastructure (Direct to Ministack)
    runs-on: ${{ needs.dr-check.outputs.runner_label }}
    needs: dr-check
    outputs:
      rds_endpoint: ${{ steps.tf.outputs.rds_endpoint }}
      ec2_public_ip: ${{ steps.tf.outputs.ec2_public_ip }}
    steps:
      - uses: actions/checkout@v4
      - name: ЁЯФз Ensure Terraform
        run: |
          if ! command -v terraform &> /dev/null; then
            curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
            echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
            sudo apt-get update && sudo apt-get install -y terraform
          fi
          
      # HANYA MEMBUAT CONFIG TERRAFORM, TIDAK ADA LAGI DOCKER RUN MINISTACK
      - name: ЁЯУЭ Create Terraform config
        run: |
          mkdir -p terraform
          cat > terraform/main.tf <<'TFEOF'
          terraform {
            required_providers {
              aws = { source = "hashicorp/aws", version = "~> 5.0" }
              random = { source = "hashicorp/random", version = "~> 3.0" }
            }
          }
          variable "ministack_endpoint" { default = "http://localhost:PORT_PLACEHOLDER" }
          variable "environment" { default = "staging" }
          variable "aws_region" { default = "REGION_PLACEHOLDER" }
          provider "aws" {
            region = var.aws_region
            access_key = "test"
            secret_key = "test"
            skip_credentials_validation = true
            skip_requesting_account_id = true
            skip_metadata_api_check = true
            s3_use_path_style = true
            endpoints {
              ec2 = var.ministack_endpoint
              s3 = var.ministack_endpoint
              sts = var.ministack_endpoint
              iam = var.ministack_endpoint
              rds = var.ministack_endpoint
            }
          }
          resource "random_id" "suffix" { byte_length = 4 }
          resource "aws_security_group" "web_sg" {
            name = "web-sg-${var.environment}-${var.aws_region}"
            tags = { Name = "web-sg-${var.environment}", Project = "DevSecOps", Region = var.aws_region }
          }
          resource "aws_instance" "web" {
            ami = "ami-0ff8a91507f77f867"
            instance_type = "t2.micro"
            security_groups = [aws_security_group.web_sg.name]
            tags = { Name = "web-server-${var.environment}" }
          }
          resource "aws_db_instance" "mysql" {
            identifier = "ministack-mysql-${var.environment}"
            engine = "mysql"
            engine_version = "8.0"
            instance_class = "db.t3.micro"
            allocated_storage = 20
            db_name = "DBNAME_PLACEHOLDER"
            username = "DBUSER_PLACEHOLDER"
            password = "DBPASS_PLACEHOLDER"
            port = 3306
            skip_final_snapshot = true
            apply_immediately = true
            publicly_accessible = true
          }
          output "rds_endpoint" { value = aws_db_instance.mysql.endpoint }
          output "ec2_public_ip" { value = aws_instance.web.public_ip }
          TFEOF
          sed -i "s/PORT_PLACEHOLDER/${{ needs.dr-check.outputs.ministack_port }}/g" terraform/main.tf
          sed -i "s/REGION_PLACEHOLDER/${{ needs.dr-check.outputs.active_region }}/g" terraform/main.tf
          sed -i "s/DBNAME_PLACEHOLDER/${{ env.DB_NAME }}/g" terraform/main.tf
          sed -i "s/DBUSER_PLACEHOLDER/${{ env.DB_USER }}/g" terraform/main.tf
          sed -i "s/DBPASS_PLACEHOLDER/${{ env.DB_PASSWORD }}/g" terraform/main.tf
          if [ "${{ needs.dr-check.outputs.use_s3_backend }}" == "true" ]; then
            sed -i '/required_providers/i\    backend "s3" {\n      bucket = "${{ env.TF_STATE_BUCKET }}"\n      key = "${{ needs.dr-check.outputs.state_key_prefix }}/${{ github.event.inputs.environment || '\''staging'\'' }}/terraform.tfstate"\n      region = "us-east-1"\n      encrypt = true\n    }' terraform/main.tf
          fi
      - name: ЁЯЧГя╕П Init & Apply Terraform
        id: tf
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_STATE_ACCESS_KEY || env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_STATE_SECRET_KEY || env.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          terraform init -input=false -reconfigure -upgrade
          terraform apply -auto-approve -input=false -var="environment=${{ github.event.inputs.environment || 'staging' }}" -var="aws_region=${{ needs.dr-check.outputs.active_region }}"
          echo "rds_endpoint=$(terraform output -raw rds_endpoint)" >> $GITHUB_OUTPUT
          echo "ec2_public_ip=$(terraform output -raw ec2_public_ip)" >> $GITHUB_OUTPUT

  # ==========================================
  # [SUB-TRACK 5.1] RDS HEALTHCHECK & DB INIT
  # ==========================================
  db-init:
    name: ЁЯЧВя╕П RDS Healthcheck & DB Init
    runs-on: ${{ needs.dr-check.outputs.runner_label }}
    needs: [dr-check, infra]
    steps:
      - name: ЁЯПе PHASE 1: RDS Engine Health Check
        run: |
          RDS_ENDPOINT="${{ needs.infra.outputs.rds_endpoint }}"
          RDS_HOST=$(echo "$RDS_ENDPOINT" | cut -d':' -f1)
          RDS_PORT=$(echo "$RDS_ENDPOINT" | cut -d':' -f2)
          [ "$RDS_HOST" = "localhost" ] && RDS_HOST="127.0.0.1"
          echo "ЁЯПе Healthcheck Ping ke TCP $RDS_HOST:$RDS_PORT..."
          for i in $(seq 1 60); do
            if docker run --rm --network host mysql:8.0 mysqladmin ping -h"$RDS_HOST" -P"$RDS_PORT" -u"${{ env.DB_USER }}" -p"${{ env.DB_PASSWORD }}" --silent 2>/dev/null; then
              echo "тЬЕ HEALTHCHECK PASS: MySQL Engine UP."
              exit 0
            fi
            echo "тП▒я╕П Waiting... ($i/60)"
            sleep 5
          done
          echo "тЭМ CRITICAL: RDS Healthcheck FAILED"
          exit 1
      - name: ЁЯЧВя╕П PHASE 2: Database Schema Initialization
        run: |
          RDS_ENDPOINT="${{ needs.infra.outputs.rds_endpoint }}"
          RDS_HOST=$(echo "$RDS_ENDPOINT" | cut -d':' -f1)
          RDS_PORT=$(echo "$RDS_ENDPOINT" | cut -d':' -f2)
          [ "$RDS_HOST" = "localhost" ] && RDS_HOST="127.0.0.1"
          docker run -i --rm --network host mysql:8.0 mysql -h"$RDS_HOST" -P"$RDS_PORT" -u"${{ env.DB_USER }}" -p"${{ env.DB_PASSWORD }}" "${{ env.DB_NAME }}" <<'SQLEOF'
          CREATE TABLE IF NOT EXISTS TodoItems (
            Id INT PRIMARY KEY AUTO_INCREMENT,
            Name VARCHAR(255) NULL,
            IsComplete TINYINT(1) NOT NULL DEFAULT 0,
            CreatedAt TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
            UpdatedAt TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
          ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
          SQLEOF
          echo "тЬЕ Database schema initialized."

  # ==========================================
  # [CONVERGENCE GATE] DEPLOYMENT
  # ==========================================
  deploy:
    name: ЁЯЪА Deploy & Health Check
    runs-on: ${{ needs.dr-check.outputs.runner_label }}
    needs: [dr-check, sast, sca, container, db-init, infra]
    environment: ${{ github.ref_name == 'develop' && '' || github.event.inputs.environment }}
    steps:
      - name: тмЗя╕П Download Docker Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: .
      - name: ЁЯУж Load Golden Image
        run: docker load < ${{ env.APP_NAME }}-image.tar.gz && echo "тЬЕ Golden Image Loaded."
      - name: ЁЯз╣ Remove old container
        run: docker rm -f ${{ env.CONTAINER_NAME }} 2>/dev/null || true
      - name: ЁЯЪА Run container
        run: |
          RDS_ENDPOINT="${{ needs.infra.outputs.rds_endpoint }}"
          RDS_HOST=$(echo "$RDS_ENDPOINT" | cut -d':' -f1)
          RDS_PORT=$(echo "$RDS_ENDPOINT" | cut -d':' -f2)
          [ "$RDS_HOST" = "localhost" ] && RDS_HOST="127.0.0.1"
          docker run -d --name ${{ env.CONTAINER_NAME }} --network host \
            -e ASPNETCORE_URLS=http://+:${{ env.HOST_PORT }} \
            -e "ConnectionStrings__DefaultConnection=Server=$RDS_HOST;Port=$RDS_PORT;Database=${{ env.DB_NAME }};Uid=${{ env.DB_USER }};Pwd=${{ env.DB_PASSWORD }};" \
            --security-opt="no-new-privileges:true" --read-only --tmpfs /tmp \
            ${{ env.APP_NAME }}:latest
      - name: ЁЯФН WAJIB Health Check Aplikasi
        run: |
          echo "тП│ Polling Application Health Endpoint..."
          HEALTH_URL="http://localhost:${{ env.CONTAINER_PORT }}/swagger/v1/swagger.json"
          for i in $(seq 1 20); do
            if curl -sf "$HEALTH_URL" >/dev/null 2>&1; then
              echo "тЬЕ HEALTH CHECK PASSED"
              exit 0
            fi
            sleep 5
          done
          echo "тЭМ HEALTH CHECK FAILED"
          docker logs ${{ env.CONTAINER_NAME }}
          exit 1

  # ==========================================
  # [POST-DEPLOY] DAST SCAN
  # ==========================================
  dast:
    name: ЁЯХ╖я╕П DAST Scan
    runs-on: ${{ needs.dr-check.outputs.runner_label }}
    needs: [dr-check, deploy]
    steps:
      - name: ЁЯХ╖я╕П Run ZAP baseline scan
        run: |
          docker run --rm --network host ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t "http://localhost:${{ env.HOST_PORT }}" -l FAIL || { echo "тЭМ DAST failed"; exit 1; }
          echo "тЬЕ DAST passed"

  # ==========================================
  # [POST-DEPLOY] ROUTING NOTIFICATION
  # ==========================================
  traffic:
    name: ЁЯМР Traffic Status
    runs-on: ubuntu-latest
    needs: [dr-check, deploy, dast]
    steps:
      - name: ЁЯУК Simulate Traffic Routing
        run: |
          REGION="${{ needs.dr-check.outputs.active_region }}"
          FAILOVER="${{ needs.dr-check.outputs.failover }}"
          echo "ЁЯМР Active Region: $REGION"
          echo "ЁЯФД DR Failover: $FAILOVER"
          echo "тЬЕ Health Check: PASSED"
          echo "ЁЯФН DAST Scan: PASSED"
          if [ "$FAILOVER" == "true" ]; then
            echo "ЁЯУН Traffic: Laptop (us-east-2) via http://localhost:${{ env.HOST_PORT }}"
          else
            echo "ЁЯУН Traffic: GitHub CI Host (us-east-1) via http://localhost:${{ env.HOST_PORT }}"
          fi
# ==========================================
  # [CLEANUP] YAML-SAFE VERSION
  # ==========================================
  cleanup:
    name: ЁЯз╣ Conditional Cleanup
    runs-on: ${{ needs.dr-check.outputs.runner_label }}
    needs: [dr-check, traffic, dast]
    if: |
      always() && 
      github.ref_name != 'develop' && 
      (needs.dast.result != 'success' || github.event.inputs.environment == 'production')
    steps:
      - name: ЁЯЧСя╕П Cleanup Resources

  # ==========================================
  # [FINAL] SUMMARY REPORT
  # ==========================================
  notify:
    name: ЁЯУв Pipeline Summary
    runs-on: ubuntu-latest
    needs: [dr-check, traffic, dast, cleanup]
    if: always()
    steps:
      - name: ЁЯУК Print Summary
        run: |
          REGION="${{ needs.dr-check.outputs.active_region }}"
          FAILOVER="${{ needs.dr-check.outputs.failover }}"
          IS_DEV="${{ github.ref_name == 'develop' && 'тЬЕ YES (Persistent)' || 'тЭМ NO' }}"
          STATUS="тЬЕ SUCCESS"
          [ "${{ needs.dast.result }}" != "success" ] && STATUS="тЭМ FAILED"
          echo "================================"
          echo "  ЁЯЫбя╕П DevSecOps Pipeline Summary"
          echo "================================"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Persistent Dev: $IS_DEV"
          echo "  Region: $REGION"
          echo "  DR Failover: $FAILOVER"
          echo "  RDS Health: тЬЕ PASSED"
          echo "  App Health: тЬЕ PASSED"
          echo "  DAST: ${{ needs.dast.result }}"
          echo "  Status: $STATUS"
          echo "================================"
          [ "$IS_DEV" == "тЬЕ YES (Persistent)" ] && echo "ЁЯТб Environment persistent for dev iterations." && echo "ЁЯМР Access: http://localhost:${{ env.HOST_PORT }}"
