name: 🛡️ DevSecOps Ministack CI/CD 

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # AWS Mock (simulasi)
  AWS_REGION:            us-east-1
  AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  S3_BUCKET:             ${{ secrets.S3_BUCKET }}
  EC2_HOST:              ${{ secrets.EC2_HOST }}
  RDS_ENDPOINT:          ${{ secrets.RDS_ENDPOINT }}
  DB_NAME:               ${{ secrets.DB_NAME }}
  DB_USER:               ${{ secrets.DB_USER }}
  DB_PASSWORD:           ${{ secrets.DB_PASSWORD }}

  # Konfigurasi Docker Deploy
  APP_DLL:               TodoWebAPI.dll
  APP_NAME:              todo-webapi
  CONTAINER_NAME:        todo-webapi
  HOST_PORT:             8080
  CONTAINER_PORT:        80

jobs:
  security_and_build:
    name: 🛡️ SAST, SCA & Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Penting untuk scanner keamanan membaca riwayat commit

      # [DevSecOps] Layer 1: Secret Scanning
      - name: 🔐 Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # [DevSecOps] Layer 2: Software Composition Analysis (SCA)
      - name: 📦 SCA - Audit NuGet Dependencies
        run: |
          echo "🔍 Checking for vulnerable NuGet packages..."
          dotnet restore TodoWebAPI/*.csproj
          dotnet list TodoWebAPI/*.csproj package --vulnerable

      - name: ☁️ Configure AWS CLI (Mock)
        run: |
          mkdir -p ~/.aws
          cat > ~/.aws/config <<EOF
          [default]
          region = ${AWS_REGION}
          output = json
          EOF
          cat > ~/.aws/credentials <<EOF
          [default]
          aws_access_key_id = ${AWS_ACCESS_KEY_ID}
          aws_secret_access_key = ${AWS_SECRET_ACCESS_KEY}
          EOF
          echo "✅ AWS mock config created."

      - name: 🔨 Build and Publish .NET App
        run: |
          echo "🔨 Restoring packages..."
          dotnet restore TodoWebAPI/*.csproj
          echo "📦 Publishing to 'publish_output'..."
          dotnet publish TodoWebAPI/*.csproj -c Release -o publish_output

      - name: 📦 Package Artifact
        run: |
          cd publish_output
          zip -r ../webapp-binaries.zip .
          cd ..
          echo "✅ webapp-binaries.zip created ($(du -h webapp-binaries.zip | cut -f1))"

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-binaries
          path: webapp-binaries.zip

      - name: ☁️ Simulate S3 Upload (Mock)
        run: |
          echo "☁️  Simulating upload to: s3://${S3_BUCKET}/artifacts/binaries/webapp-binaries.zip"

      - name: 🚀 Simulate EC2 Deploy (Mock)
        run: |
          echo "🚀 Simulating deployment to EC2 host: ${EC2_HOST}"
          RDS_HOST=$(echo "${RDS_ENDPOINT}" | cut -d':' -f1)
          cat <<EOF
          ============================================
          🖥️  EC2 Deployment Simulation:
          ============================================
          1. Stopping webapp service...
          2. Downloading artifact from S3...
          3. Extracting to /var/www/webapp...
          4. Updating appsettings.json:
              "DefaultConnection": "Server=${RDS_HOST};Database=${DB_NAME};User=${DB_USER};Password=******"
          5. Starting webapp service...
          ============================================
          ✅ EC2 simulation completed.
          EOF

  deploy:
    name: 🐳 Container Scan & Deploy
    needs: security_and_build
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: 🧪 Check runner prerequisites
        shell: bash
        run: |
          set -euo pipefail
          docker --version
          unzip -v >/dev/null

      - name: ⬇️ Download workflow artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-binaries
          path: ./artifact

      - name: 📂 Extract artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf deploy_input
          mkdir -p deploy_input/publish
          unzip -q ./artifact/webapp-binaries.zip -d deploy_input/publish
          if [[ ! -f "deploy_input/publish/${APP_DLL}" ]]; then
            echo "ERROR: ${APP_DLL} not found in artifact"
            find deploy_input/publish -maxdepth 3 -type f | sed 's/^/ - /'
            exit 1
          fi

      # [DevSecOps] Layer 3: Hardened Dockerfile
      - name: 🐳 Create Secure Dockerfile
        shell: bash
        run: |
          set -euo pipefail
          # Menggunakan Alpine untuk memperkecil attack surface dan menambahkan user non-root
          cat > deploy_input/Dockerfile <<EOF
          FROM mcr.microsoft.com/dotnet/aspnet:8.0-alpine
          WORKDIR /app
          EXPOSE ${CONTAINER_PORT}
          ENV ASPNETCORE_URLS=http://+:${CONTAINER_PORT}
          
          # Security: Jalankan sebagai non-root user
          RUN adduser -u 1000 --disabled-password --gecos "" appuser && chown -R appuser /app
          USER appuser
          
          COPY publish/ /app/
          ENTRYPOINT ["dotnet", "${APP_DLL}"]
          EOF

      - name: 🏗️ Build Docker image on laptop
        shell: bash
        run: |
          set -euo pipefail
          docker build -t ${APP_NAME}:latest ./deploy_input

      # [DevSecOps] Layer 4: Container Vulnerability Scanning
      - name: 🛡️ Container Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.APP_NAME }}:latest'
          format: 'table'
          exit-code: '1' # Set 1 agar pipeline GAGAL jika menemukan celah keamanan
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: 🧹 Remove old container
        shell: bash
        run: |
          set -euo pipefail
          docker rm -f ${CONTAINER_NAME} || true

      - name: 🚀 Run secure container
        shell: bash
        run: |
          set -euo pipefail
          # Menambahkan parameter security-opt untuk keamanan ekstra pada runtime
          docker run -d \
            --name ${CONTAINER_NAME} \
            -p ${HOST_PORT}:${CONTAINER_PORT} \
            -e ASPNETCORE_ENVIRONMENT=Development \
            -e ASPNETCORE_URLS=http://+:80 \            
            --restart unless-stopped \
            --security-opt="no-new-privileges:true" \
            ${APP_NAME}:latest

      - name: ✅ Show running container
        shell: bash
        run: |
          set -euo pipefail
          docker ps --filter "name=${CONTAINER_NAME}"
          docker logs --tail 20 ${CONTAINER_NAME} || true
