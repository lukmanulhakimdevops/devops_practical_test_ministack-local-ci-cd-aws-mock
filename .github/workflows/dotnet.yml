name: 🛡️ DevSecOps Ministack CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION:            us-east-1
  AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  S3_BUCKET:             ${{ secrets.S3_BUCKET }}
  EC2_HOST:              ${{ secrets.EC2_HOST }}
  RDS_ENDPOINT:          ${{ secrets.RDS_ENDPOINT }}
  DB_NAME:               ${{ secrets.DB_NAME }}
  DB_USER:               ${{ secrets.DB_USER }}
  DB_PASSWORD:           ${{ secrets.DB_PASSWORD }}

  APP_DLL:               TodoWebAPI.dll
  APP_NAME:              todo-webapi
  CONTAINER_NAME:        todo-webapi
  HOST_PORT:             8080
  CONTAINER_PORT:        80

# ============================================================
# JOB 1 — SAST, SCA & Build  (runs on GitHub-hosted runner)
# ============================================================
jobs:
  security_and_build:
    name: 🛡️ SAST, SCA & Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # required by Gitleaks

      # ── 🔐 Layer 1: Secret Scanning ─────────────────────────
      - name: 🔐 Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── ⚙️  Setup .NET ────────────────────────────────────────
      - name: 🔧 Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ── 📦 Layer 2: SCA & Auto-Patch ─────────────────────────
      - name: 🩹 Auto-Patch Vulnerable NuGet Packages
        run: |
          echo "🩹 Patching Microsoft.Build to a secure version..."
          for proj in TodoWebAPI/*.csproj; do
            dotnet add "$proj" package Microsoft.Build --version 17.8.43
          done

      - name: 📦 SCA — Audit NuGet Dependencies
        run: |
          echo "🔍 Scanning NuGet packages for known vulnerabilities..."
          dotnet restore TodoWebAPI/*.csproj
          dotnet list TodoWebAPI/*.csproj package --vulnerable

      # ── ☁️  AWS Mock Config ───────────────────────────────────
      - name: ☁️ Configure AWS CLI (Mock)
        run: |
          mkdir -p ~/.aws
          cat > ~/.aws/config <<EOF
          [default]
          region     = ${AWS_REGION}
          output     = json
          EOF
          cat > ~/.aws/credentials <<EOF
          [default]
          aws_access_key_id     = ${AWS_ACCESS_KEY_ID}
          aws_secret_access_key = ${AWS_SECRET_ACCESS_KEY}
          EOF
          echo "✅ AWS mock config created."

      # ── 🔨 Build & Publish ────────────────────────────────────
      - name: 🔨 Build and Publish .NET App
        run: |
          echo "📦 Restoring packages..."
          dotnet restore TodoWebAPI/*.csproj

          echo "🔨 Publishing release build..."
          dotnet publish TodoWebAPI/*.csproj -c Release -o publish_output

      - name: 📦 Package Artifact
        run: |
          cd publish_output
          zip -r ../webapp-binaries.zip .

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-binaries
          path: webapp-binaries.zip

# ============================================================
# JOB 2 — DAST, Container Scan & Deploy  (self-hosted runner)
# ============================================================
  deploy:
    name: 🐳 DAST, Scan & Deploy
    needs: security_and_build
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: 🧪 Check Runner Prerequisites
        shell: bash
        run: |
          set -euo pipefail
          echo "── Docker version ──────────────────────────────"
          docker --version
          echo "── unzip version ───────────────────────────────"
          unzip -v >/dev/null
          echo "✅ All prerequisites OK."

      - name: ⬇️ Download Workflow Artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-binaries
          path: ./artifact

      - name: 📂 Extract Artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf deploy_input
          mkdir -p deploy_input/publish
          unzip -q ./artifact/webapp-binaries.zip -d deploy_input/publish
          echo "✅ Artifact extracted to deploy_input/publish/"

      # ── 🐳 Layer 3: Hardened Dockerfile ──────────────────────
      #
      # ROOT CAUSE FIX:
      #   The app's appsettings.json configures Kestrel with both an HTTP
      #   (port 5000) and an HTTPS (port 5001) endpoint.  Even when
      #   ASPNETCORE_URLS overrides the port, Kestrel still tries to
      #   initialise the HTTPS endpoint and crashes because no certificate
      #   exists inside the container.
      #
      # SOLUTION:
      #   Generate a self-signed PFX certificate with openssl at image-build
      #   time and point Kestrel to it via environment variables.  The app
      # ──────────────────────────────────────────────────────────
      # ── 🐳 Layer 3: Hardened Dockerfile ──────────────────────
      #
      # APPROACH: --network host (no port mapping).
      #   • App (appsettings Kestrel) binds HTTP:5000 and HTTPS:5001
      #     directly on the host network — no NAT, no iptables needed.
      #   • Access from the host: http://localhost:5000
      #   • DAST target: http://localhost:5000
      # ──────────────────────────────────────────────────────────
      - name: 🐳 Create Secure Dockerfile
        shell: bash
        run: |
          set -euo pipefail
          cat > deploy_input/Dockerfile <<'DOCKERFILE'
FROM mcr.microsoft.com/dotnet/aspnet:8.0-alpine

WORKDIR /app

# ── 🔒 OS hardening ──────────────────────────────────────────
RUN apk update && apk upgrade --no-cache \
 && apk add --no-cache openssl

# ── 🔑 Self-signed cert (Kestrel HTTPS endpoint requires a cert) ─
RUN openssl req -x509 -newkey rsa:4096 \
      -keyout /app/https-key.pem \
      -out    /app/https-cert.pem \
      -days   365 -nodes \
      -subj   '/CN=localhost' \
 && openssl pkcs12 -export \
      -out     /app/aspnetapp.pfx \
      -inkey   /app/https-key.pem \
      -in      /app/https-cert.pem \
      -passout pass:devpassword \
 && rm /app/https-key.pem /app/https-cert.pem \
 && apk del openssl

# ── ⚙️  Runtime environment ──────────────────────────────────
ENV ASPNETCORE_ENVIRONMENT=Development
ENV ASPNETCORE_Kestrel__Certificates__Default__Path=/app/aspnetapp.pfx
ENV ASPNETCORE_Kestrel__Certificates__Default__Password=devpassword

# ── 👤 Run as non-root ───────────────────────────────────────
RUN adduser -u 1000 --disabled-password --gecos "" appuser \
 && chown -R appuser /app
USER appuser

COPY publish/ /app/
ENTRYPOINT ["dotnet", "TodoWebAPI.dll"]
DOCKERFILE
          echo "✅ Dockerfile created."

      - name: 🏗️ Build Docker Image
        shell: bash
        run: |
          set -euo pipefail
          docker build -t ${APP_NAME}:latest ./deploy_input
          echo "✅ Docker image built: ${APP_NAME}:latest"

      # ── 🛡️ Layer 4: Container Scan (Trivy) ───────────────────
      - name: 🛡️ Container Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.APP_NAME }}:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # ── 🧹 Remove Old Container ───────────────────────────────
      - name: 🧹 Remove Old Container
        shell: bash
        run: |
          docker rm -f ${CONTAINER_NAME} 2>/dev/null || true
          echo "✅ Old container removed (if any)."

      # ── 🚀 Run Container (Pre-DAST) ───────────────────────────
      - name: 🚀 Run Secure Container (Pre-DAST)
        shell: bash
        run: |
          set -euo pipefail
          # --network host: container shares host network stack directly.
          # No port mapping needed — app is reachable at localhost:5000 (HTTP)
          # and localhost:5001 (HTTPS) on the host.
          docker run -d \
            --name    ${CONTAINER_NAME} \
            --network host \
            -e        ASPNETCORE_ENVIRONMENT=Development \
            -e        ASPNETCORE_Kestrel__Certificates__Default__Path=/app/aspnetapp.pfx \
            -e        ASPNETCORE_Kestrel__Certificates__Default__Password=devpassword \
            --cap-drop ALL \
            --security-opt="no-new-privileges:true" \
            --restart unless-stopped \
            --read-only \
            --tmpfs   /tmp \
            ${APP_NAME}:latest
          echo "✅ Container started: ${CONTAINER_NAME} (--network host, app on :5000/:5001)"

      - name: ⏳ Wait for App Readiness
        shell: bash
        run: |
          echo "⏳ Waiting for the app to become ready..."
          for i in $(seq 1 12); do
            if curl -sf http://localhost:5000/health >/dev/null 2>&1; then
              echo "✅ App is ready after $((i * 5)) seconds (localhost:5000)."
              exit 0
            fi
            echo "   attempt $i/12 — retrying in 5 s..."
            sleep 5
          done
          echo "❌ App did not become ready in 60 s. Showing logs:"
          docker logs ${CONTAINER_NAME}
          exit 1

      # ── 🕷️ Layer 5: DAST (OWASP ZAP) ─────────────────────────
      - name: 🕷️ DAST Scan (OWASP ZAP)
        shell: bash
        run: |
          echo "💥 Launching DAST scan against the running container..."
          docker run --rm --network="host" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t http://localhost:5000 \
              -l FAIL || {
                echo "❌ DAST found critical vulnerability — stopping container."
                docker rm -f ${CONTAINER_NAME}
                exit 1
              }
          echo "✅ DAST scan passed. Application is safe."

      # ── ✅ Final Verification ─────────────────────────────────
      - name: ✅ Show Running Container
        shell: bash
        run: |
          set -euo pipefail
          echo "── Container status ────────────────────────────"
          docker ps --filter "name=${CONTAINER_NAME}"
          echo "── Last 20 log lines ───────────────────────────"
          docker logs --tail 20 ${CONTAINER_NAME} || true
