name: 🛡️ DevSecOps Ministack CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # Konfigurasi AWS Mock (simulasi)
  AWS_REGION:            us-east-1
  AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  S3_BUCKET:             ${{ secrets.S3_BUCKET }}
  EC2_HOST:              ${{ secrets.EC2_HOST }}
  RDS_ENDPOINT:          ${{ secrets.RDS_ENDPOINT }}
  DB_NAME:               ${{ secrets.DB_NAME }}
  DB_USER:               ${{ secrets.DB_USER }}
  DB_PASSWORD:           ${{ secrets.DB_PASSWORD }}

  # Konfigurasi Aplikasi & Container
  APP_DLL:               TodoWebAPI.dll
  APP_NAME:              todo-webapi
  CONTAINER_NAME:        todo-webapi
  HOST_PORT:             8080
  CONTAINER_PORT:        80

jobs:
  security_and_build:
    name: 🛡️ SAST, SCA & Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Diperlukan untuk Gitleaks

      # -------------------------------
      # 🔐 LAYER 1: Secret Scanning
      # -------------------------------
      - name: 🔐 Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # -------------------------------
      # 📦 LAYER 2: SCA & Auto-Patch
      # -------------------------------
      - name: 🩹 Auto-Patch Vulnerable NuGet Packages
        run: |
          echo "🩹 Menginjeksi patch keamanan untuk Microsoft.Build..."
          for proj in TodoWebAPI/*.csproj; do
            dotnet add "$proj" package Microsoft.Build --version 17.8.43
          done

      - name: 📦 SCA - Audit NuGet Dependencies
        run: |
          echo "🔍 Memeriksa kerentanan package NuGet..."
          dotnet restore TodoWebAPI/*.csproj
          dotnet list TodoWebAPI/*.csproj package --vulnerable

      # -------------------------------
      # ☁️ AWS Mock Configuration
      # -------------------------------
      - name: ☁️ Configure AWS CLI (Mock)
        run: |
          mkdir -p ~/.aws
          cat > ~/.aws/config <<EOF
          [default]
          region = ${AWS_REGION}
          output = json
          EOF
          cat > ~/.aws/credentials <<EOF
          [default]
          aws_access_key_id = ${AWS_ACCESS_KEY_ID}
          aws_secret_access_key = ${AWS_SECRET_ACCESS_KEY}
          EOF
          echo "✅ AWS mock config created."

      # -------------------------------
      # 🔨 Build & Publish
      # -------------------------------
      - name: 🔨 Build and Publish .NET App
        run: |
          echo "🔨 Restoring packages..."
          dotnet restore TodoWebAPI/*.csproj
          echo "📦 Publishing to 'publish_output'..."
          dotnet publish TodoWebAPI/*.csproj -c Release -o publish_output

      - name: 📦 Package Artifact
        run: |
          cd publish_output
          zip -r ../webapp-binaries.zip .
          cd ..

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-binaries
          path: webapp-binaries.zip

  deploy:
    name: 🐳 DAST, Scan & Deploy
    needs: security_and_build
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: 🧪 Check Runner Prerequisites
        shell: bash
        run: |
          set -euo pipefail
          docker --version
          unzip -v >/dev/null

      - name: ⬇️ Download Workflow Artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-binaries
          path: ./artifact

      - name: 📂 Extract Artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf deploy_input
          mkdir -p deploy_input/publish
          unzip -q ./artifact/webapp-binaries.zip -d deploy_input/publish

      # -------------------------------
      # 🐳 LAYER 3: Hardened Dockerfile
      # -------------------------------
      - name: 🐳 Create Secure Dockerfile
        shell: bash
        run: |
          set -euo pipefail
          cat > deploy_input/Dockerfile <<EOF
          FROM mcr.microsoft.com/dotnet/aspnet:8.0-alpine
          WORKDIR /app
          EXPOSE ${CONTAINER_PORT}
          ENV ASPNETCORE_ENVIRONMENT=Development
          ENV ASPNETCORE_URLS=http://+:${CONTAINER_PORT}

          # 🔒 Patch OS untuk menutup CVE (libcrypto, libssl)
          RUN apk update && apk upgrade --no-cache

          # 👤 Jalankan sebagai user non-root
          RUN adduser -u 1000 --disabled-password --gecos "" appuser && chown -R appuser /app
          USER appuser

          COPY publish/ /app/
          ENTRYPOINT ["dotnet", "${APP_DLL}"]
          EOF

      - name: 🏗️ Build Docker Image
        shell: bash
        run: |
          set -euo pipefail
          docker build -t ${APP_NAME}:latest ./deploy_input

      # -------------------------------
      # 🛡️ LAYER 4: Container Scan (Trivy)
      # -------------------------------
      - name: 🛡️ Container Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.APP_NAME }}:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # -------------------------------
      # 🧹 Bersihkan Container Lama
      # -------------------------------
      - name: 🧹 Remove Old Container
        shell: bash
        run: |
          set -euo pipefail
          docker rm -f ${CONTAINER_NAME} || true

      # -------------------------------
      # 🚀 Jalankan Container (Pre‑DAST)
      # -------------------------------
      - name: 🚀 Run Secure Container (Pre-DAST)
        shell: bash
        run: |
          set -euo pipefail
          docker run -d \
            --name ${CONTAINER_NAME} \
            -p ${HOST_PORT}:${CONTAINER_PORT} \
            -e ASPNETCORE_ENVIRONMENT=Development \
            -e ASPNETCORE_URLS="http://+:${CONTAINER_PORT}" \
            --restart unless-stopped \
            --security-opt="no-new-privileges:true" \
            ${APP_NAME}:latest

      - name: ⏳ Wait for App Readiness
        shell: bash
        run: |
          echo "⏳ Menunggu aplikasi siap sebelum DAST..."
          sleep 15

      # -------------------------------
      # 🕷️ LAYER 5: DAST (OWASP ZAP)
      # -------------------------------
      - name: 🕷️ DAST Scan (OWASP ZAP)
        shell: bash
        run: |
          echo "💥 Melancarkan serangan DAST ke aplikasi yang sedang berjalan..."
          docker run --rm --network="host" ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t http://localhost:${HOST_PORT} \
            -l FAIL || {
              echo "❌ DAST menemukan celah fatal! Menghancurkan container..."
              docker rm -f ${CONTAINER_NAME}
              exit 1
            }
          echo "✅ DAST scan lulus! Aplikasi aman dari serangan luar."

      # -------------------------------
      # ✅ Verifikasi Akhir
      # -------------------------------
      - name: ✅ Show Running Container
        shell: bash
        run: |
          set -euo pipefail
          docker ps --filter "name=${CONTAINER_NAME}"
          docker logs --tail 20 ${CONTAINER_NAME} || true
