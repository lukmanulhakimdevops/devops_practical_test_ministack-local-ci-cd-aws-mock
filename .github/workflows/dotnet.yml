name: 🛡️ DevSecOps Ministack CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION:            us-east-1
  AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  S3_BUCKET:             ${{ secrets.S3_BUCKET }}
  EC2_HOST:              ${{ secrets.EC2_HOST }}
  RDS_ENDPOINT:          ${{ secrets.RDS_ENDPOINT }}
  DB_NAME:               ${{ secrets.DB_NAME }}
  DB_USER:               ${{ secrets.DB_USER }}
  DB_PASSWORD:           ${{ secrets.DB_PASSWORD }}

  APP_DLL:               TodoWebAPI.dll
  APP_NAME:              todo-webapi
  CONTAINER_NAME:        todo-webapi
  HOST_PORT:             8080
  CONTAINER_PORT:        5000

# ============================================================================
# JOB 1: SAST, SCA & Build (GitHub-hosted runner)
# ============================================================================
jobs:
  security_and_build:
    name: 🛡️ SAST, SCA & Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔐 Secret scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: 🩹 Auto-patch vulnerable NuGet packages
        run: |
          echo "🩹 Patching Microsoft.Build to a secure version..."
          for proj in TodoWebAPI/*.csproj; do
            dotnet add "$proj" package Microsoft.Build --version 17.8.43
          done

      - name: 📦 SCA – Audit NuGet dependencies
        run: |
          echo "🔍 Scanning NuGet packages for known vulnerabilities..."
          dotnet restore TodoWebAPI/*.csproj
          dotnet list TodoWebAPI/*.csproj package --vulnerable

      - name: ☁️ Configure AWS CLI (mock)
        run: |
          mkdir -p ~/.aws
          cat > ~/.aws/config <<EOF
          [default]
          region = ${AWS_REGION}
          output = json
          EOF
          cat > ~/.aws/credentials <<EOF
          [default]
          aws_access_key_id = ${AWS_ACCESS_KEY_ID}
          aws_secret_access_key = ${AWS_SECRET_ACCESS_KEY}
          EOF
          echo "✅ AWS mock config created."

      - name: 🔨 Build and publish .NET app
        run: |
          echo "📦 Restoring packages..."
          dotnet restore TodoWebAPI/*.csproj

          echo "🔨 Publishing release build..."
          dotnet publish TodoWebAPI/*.csproj -c Release -o publish_output

      - name: 📤 Upload artifact (publish_output folder)
        uses: actions/upload-artifact@v4
        with:
          name: webapp-binaries
          path: publish_output

# ============================================================================
# JOB 2: DAST, Container Scan & Deploy (self-hosted runner)
# ============================================================================
  deploy:
    name: 🐳 DAST, Scan & Deploy
    needs: security_and_build
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: 🧪 Check runner prerequisites
        shell: bash
        run: |
          set -euo pipefail
          echo "── Docker version ──────────────────────────────"
          docker --version
          echo "── unzip version ───────────────────────────────"
          unzip -v >/dev/null
          echo "✅ All prerequisites OK."

      - name: ⬇️ Download workflow artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-binaries
          path: ./artifact

      - name: 📂 Extract artifact (GitHub auto‑zip)
        shell: bash
        run: |
          set -euo pipefail
          rm -rf deploy_input
          mkdir -p deploy_input/publish
          # The downloaded artifact is a zip file named 'webapp-binaries.zip'
          unzip -q ./artifact/webapp-binaries.zip -d deploy_input/publish
          echo "✅ Artifact extracted to deploy_input/publish/"

      - name: 🐳 Create secure Dockerfile
        shell: bash
        run: |
          set -euo pipefail
          cat > deploy_input/Dockerfile <<'DOCKERFILE'
          FROM mcr.microsoft.com/dotnet/aspnet:8.0-alpine

          WORKDIR /app

          RUN apk update && apk upgrade --no-cache \
           && apk add --no-cache openssl

          RUN openssl req -x509 -newkey rsa:4096 \
                -keyout /app/https-key.pem \
                -out    /app/https-cert.pem \
                -days   365 -nodes \
                -subj   '/CN=localhost' \
           && openssl pkcs12 -export \
                -out     /app/aspnetapp.pfx \
                -inkey   /app/https-key.pem \
                -in      /app/https-cert.pem \
                -passout pass:devpassword \
           && rm /app/https-key.pem /app/https-cert.pem \
           && apk del openssl

          ENV ASPNETCORE_ENVIRONMENT=Development
          ENV ASPNETCORE_Kestrel__Certificates__Default__Path=/app/aspnetapp.pfx
          ENV ASPNETCORE_Kestrel__Certificates__Default__Password=devpassword

          RUN adduser -u 1000 --disabled-password --gecos "" appuser \
           && chown -R appuser /app
          USER appuser

          COPY publish/ /app/
          ENTRYPOINT ["dotnet", "TodoWebAPI.dll"]
          DOCKERFILE
          echo "✅ Dockerfile created."

      - name: 🏗️ Build Docker image
        shell: bash
        run: |
          set -euo pipefail
          docker build -t ${APP_NAME}:latest ./deploy_input
          echo "✅ Docker image built: ${APP_NAME}:latest"

      - name: 🛡️ Container scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.APP_NAME }}:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: 🧹 Remove old container
        shell: bash
        run: |
          docker rm -f ${CONTAINER_NAME} 2>/dev/null || true
          echo "✅ Old container removed (if any)."

      - name: 🚀 Run secure container (pre‑DAST)
        shell: bash
        run: |
          set -euo pipefail
          CONNECTION_STRING="Server=${RDS_ENDPOINT};Port=3306;Database=${DB_NAME};Uid=${DB_USER};Pwd=${DB_PASSWORD};"
          docker run -d \
            --name  ${CONTAINER_NAME} \
            -p      ${HOST_PORT}:${CONTAINER_PORT} \
            -e      ASPNETCORE_ENVIRONMENT=Development \
            -e      ASPNETCORE_Kestrel__Certificates__Default__Path=/app/aspnetapp.pfx \
            -e      ASPNETCORE_Kestrel__Certificates__Default__Password=devpassword \
            -e      ConnectionStrings__DefaultConnection="${CONNECTION_STRING}" \
            --security-opt="no-new-privileges:true" \
            --restart unless-stopped \
            --read-only \
            --tmpfs /tmp \
            ${APP_NAME}:latest
          echo "✅ Container started: ${CONTAINER_NAME} (host:${HOST_PORT} → container:${CONTAINER_PORT})"

      - name: ⏳ Wait for app readiness
        shell: bash
        run: |
          echo "⏳ Waiting for the app to become ready..."
          for i in $(seq 1 12); do
            if curl -sf http://localhost:${HOST_PORT}/swagger/v1/swagger.json >/dev/null 2>&1; then
              echo "✅ App is ready after $((i * 5)) seconds."
              exit 0
            fi
            echo "   attempt $i/12 — retrying in 5 s..."
            sleep 5
          done
          echo "❌ App did not become ready in 60 s. Showing logs:"
          docker logs ${CONTAINER_NAME}
          exit 1

      - name: 🕷️ DAST scan (OWASP ZAP)
        shell: bash
        run: |
          echo "💥 Launching DAST scan against the running container..."
          docker run --rm --network="host" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t http://localhost:${HOST_PORT} \
              -l FAIL || {
                echo "❌ DAST found critical vulnerability — stopping container."
                docker rm -f ${CONTAINER_NAME}
                exit 1
              }
          echo "✅ DAST scan passed. Application is safe."

      - name: ✅ Show running container
        shell: bash
        run: |
          set -euo pipefail
          echo "── Container status ────────────────────────────"
          docker ps --filter "name=${CONTAINER_NAME}"
          echo "── Last 20 log lines ───────────────────────────"
          docker logs --tail 20 ${CONTAINER_NAME} || true
