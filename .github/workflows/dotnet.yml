      - name: 📤 Package publish output
        shell: bash
        run: |
          set -euo pipefail
          cd publish_output
          zip -r ../webapp-binaries.zip . > /dev/null
          cd ..
          ls -lh webapp-binaries.zip

      - name: ⬆️ Upload GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-binaries
          path: webapp-binaries.zip
          if-no-files-found: error
          retention-days: 7
