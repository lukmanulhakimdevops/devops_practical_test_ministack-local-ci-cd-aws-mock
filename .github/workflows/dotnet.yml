name: 🛡️ DevSecOps Ministack CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # ── AWS Mock Configuration ────────────────────────────────
  AWS_REGION:            us-east-1
  AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  S3_BUCKET:             ${{ secrets.S3_BUCKET }}
  EC2_HOST:              ${{ secrets.EC2_HOST }}
  RDS_ENDPOINT:          ${{ secrets.RDS_ENDPOINT }}
  DB_NAME:               ${{ secrets.DB_NAME }}
  DB_USER:               ${{ secrets.DB_USER }}
  DB_PASSWORD:           ${{ secrets.DB_PASSWORD }}

  # ── Application & Container Settings ──────────────────────
  APP_DLL:               TodoWebAPI.dll
  APP_NAME:              todo-webapi
  CONTAINER_NAME:        todo-webapi
  HOST_PORT:             8080
  APP_PORT:              5000          # port yang digunakan aplikasi (sesuai appsettings)

jobs:
  # ═══════════════════════════════════════════════════════════════
  #  JOB 1 – SAST, SCA & Build (GitHub‑hosted runner)
  # ═══════════════════════════════════════════════════════════════
  security_and_build:
    name: 🛡️ SAST, SCA & Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Layer 1: Secret Scanning ─────────────────────────
      - name: 🔐 Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Setup .NET ───────────────────────────────────────
      - name: 🔧 Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ── Layer 2: SCA & Auto‑Patch ────────────────────────
      - name: 🩹 Auto‑Patch Vulnerable NuGet Packages
        run: |
          echo "🩹 Patching Microsoft.Build to a secure version..."
          for proj in TodoWebAPI/*.csproj; do
            dotnet add "$proj" package Microsoft.Build --version 17.8.43
          done

      - name: 📦 SCA – Audit NuGet Dependencies
        run: |
          echo "🔍 Scanning NuGet packages for known vulnerabilities..."
          dotnet restore TodoWebAPI/*.csproj
          dotnet list TodoWebAPI/*.csproj package --vulnerable

      # ── AWS Mock Config ──────────────────────────────────
      - name: ☁️ Configure AWS CLI (Mock)
        run: |
          mkdir -p ~/.aws
          cat > ~/.aws/config <<EOF
          [default]
          region     = ${AWS_REGION}
          output     = json
          EOF
          cat > ~/.aws/credentials <<EOF
          [default]
          aws_access_key_id     = ${AWS_ACCESS_KEY_ID}
          aws_secret_access_key = ${AWS_SECRET_ACCESS_KEY}
          EOF
          echo "✅ AWS mock config created."

      # ── Build & Publish ──────────────────────────────────
      - name: 🔨 Build and Publish .NET App
        run: |
          echo "📦 Restoring packages..."
          dotnet restore TodoWebAPI/*.csproj
          echo "🔨 Publishing release build..."
          dotnet publish TodoWebAPI/*.csproj -c Release -o publish_output

      - name: 📦 Package Artifact
        run: |
          cd publish_output
          zip -r ../webapp-binaries.zip .

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-binaries
          path: webapp-binaries.zip

  # ═══════════════════════════════════════════════════════════════
  #  JOB 2 – DAST, Container Scan & Deploy (self‑hosted runner)
  # ═══════════════════════════════════════════════════════════════
  deploy:
    name: 🐳 DAST, Scan & Deploy
    needs: security_and_build
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: 🧪 Check Runner Prerequisites
        shell: bash
        run: |
          set -euo pipefail
          docker --version
          unzip -v >/dev/null
          echo "✅ Prerequisites OK."

      - name: ⬇️ Download Workflow Artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-binaries
          path: ./artifact

      - name: 📂 Extract Artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf deploy_input
          mkdir -p deploy_input/publish
          unzip -q ./artifact/webapp-binaries.zip -d deploy_input/publish

      # ── Layer 3: Hardened Dockerfile (Simplified, No iptables) ─
      - name: 🐳 Create Secure Dockerfile
        shell: bash
        run: |
          set -euo pipefail
          cat > deploy_input/Dockerfile <<'DOCKERFILE'
          FROM mcr.microsoft.com/dotnet/aspnet:8.0-alpine

          WORKDIR /app

          # 🔒 OS hardening + cleanup
          RUN apk update && apk upgrade --no-cache

          # 👤 Create non‑root user
          RUN adduser -u 1000 --disabled-password --gecos "" appuser \
              && chown -R appuser /app

          # ⚙️ Environment: force HTTP only, disable HTTPS redirect
          ENV ASPNETCORE_ENVIRONMENT=Development
          ENV ASPNETCORE_URLS=http://+:5000
          # (Opsional) matikan HTTPS redirection jika ada di kode
          # ENV ASPNETCORE_HTTPS_PORT=

          USER appuser

          EXPOSE 5000

          COPY publish/ /app/

          ENTRYPOINT ["dotnet", "TodoWebAPI.dll"]
          DOCKERFILE
          echo "✅ Dockerfile created."

      - name: 🏗️ Build Docker Image
        shell: bash
        run: |
          docker build -t ${APP_NAME}:latest ./deploy_input
          echo "✅ Image built: ${APP_NAME}:latest"

      # ── Layer 4: Container Scan (Trivy) ──────────────────
      - name: 🛡️ Container Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.APP_NAME }}:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # ── Remove Old Container ─────────────────────────────
      - name: 🧹 Remove Old Container
        shell: bash
        run: |
          docker rm -f ${CONTAINER_NAME} 2>/dev/null || true

      # ── Run Container (Direct Port Mapping) ──────────────
      - name: 🚀 Run Secure Container (Pre‑DAST)
        shell: bash
        run: |
          docker run -d \
            --name ${CONTAINER_NAME} \
            -p ${HOST_PORT}:${APP_PORT} \
            -e ASPNETCORE_ENVIRONMENT=Development \
            -e ASPNETCORE_URLS="http://+:${APP_PORT}" \
            --restart unless-stopped \
            --read-only \
            --tmpfs /tmp \
            --security-opt="no-new-privileges:true" \
            ${APP_NAME}:latest
          echo "✅ Container started on host port ${HOST_PORT} → container port ${APP_PORT}"

      - name: ⏳ Wait for App Readiness
        shell: bash
        run: |
          echo "⏳ Waiting for app to become ready..."
          for i in {1..12}; do
            if curl -sf http://localhost:${HOST_PORT}/health >/dev/null 2>&1; then
              echo "✅ App ready after $((i * 5)) seconds."
              exit 0
            fi
            # Jika endpoint /health tidak ada, coba root
            if curl -sf http://localhost:${HOST_PORT}/ >/dev/null 2>&1; then
              echo "✅ App responded on root endpoint."
              exit 0
            fi
            sleep 5
          done
          echo "❌ App did not become ready in 60s. Logs:"
          docker logs ${CONTAINER_NAME}
          exit 1

      # ── Layer 5: DAST (OWASP ZAP) ────────────────────────
      - name: 🕷️ DAST Scan (OWASP ZAP)
        shell: bash
        run: |
          echo "💥 Launching DAST scan against http://localhost:${HOST_PORT}"
          docker run --rm --network="host" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://localhost:${HOST_PORT} -l FAIL || {
              echo "❌ DAST found critical issues. Stopping container."
              docker rm -f ${CONTAINER_NAME}
              exit 1
            }
          echo "✅ DAST scan passed."

      # ── Final Verification ───────────────────────────────
      - name: ✅ Show Running Container
        shell: bash
        run: |
          docker ps --filter "name=${CONTAINER_NAME}"
          docker logs --tail 20 ${CONTAINER_NAME} || true
