name: 🚀 Deploy Existing .NET Publish Artifact to Laptop Docker

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-laptop-main
  cancel-in-progress: true

env:
  APP_NAME: todo-api
  APP_DLL: TodoWebAPI.dll
  ZIP_PATH: artifacts/binaries/linux-x64/webapp-binaries.zip
  ARTIFACT_NAME: webapp-binaries
  CONTAINER_NAME: todo-api
  HOST_PORT: "8080"
  CONTAINER_PORT: "8080"

jobs:
  package-artifact:
    name: Prepare Existing Publish Artifact
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ✅ Validate packaged app files
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f "${ZIP_PATH}" ]]; then
            echo "ERROR: ZIP_PATH not found: ${ZIP_PATH}"
            echo "Available files under artifacts:"
            find artifacts -maxdepth 5 -type f | sed 's/^/ - /' || true
            exit 1
          fi

          mkdir -p artifact_bundle

          cp "${ZIP_PATH}" "artifact_bundle/webapp-binaries.zip"
          printf '%s' "${APP_DLL}" > artifact_bundle/app_dll.txt

          echo "Artifact prepared:"
          ls -lah artifact_bundle

      - name: ⬆️ Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: artifact_bundle/
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy to Laptop Docker
    needs: package-artifact
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: 🧪 Check runner prerequisites
        shell: bash
        run: |
          set -euo pipefail
          docker --version
          unzip -v >/dev/null

      - name: ⬇️ Download workflow artifact
        uses: actions/download-artifact@v5
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ./artifact

      - name: 📂 Extract artifact and verify DLL
        shell: bash
        run: |
          set -euo pipefail

          APP_DLL="$(cat ./artifact/app_dll.txt)"
          echo "APP_DLL=${APP_DLL}" >> "$GITHUB_ENV"

          rm -rf deploy_input
          mkdir -p deploy_input/publish

          unzip -q ./artifact/webapp-binaries.zip -d deploy_input/publish

          if [[ ! -f "deploy_input/publish/${APP_DLL}" ]]; then
            echo "ERROR: DLL not found after unzip: ${APP_DLL}"
            echo "Contents of deploy_input/publish:"
            find deploy_input/publish -maxdepth 3 -type f | sed 's/^/ - /'
            exit 1
          fi

      - name: 🐳 Create Dockerfile
        shell: bash
        run: |
          set -euo pipefail

          cat > deploy_input/Dockerfile <<EOF
          FROM mcr.microsoft.com/dotnet/aspnet:8.0
          WORKDIR /app
          EXPOSE ${CONTAINER_PORT}
          ENV ASPNETCORE_URLS=http://+:${CONTAINER_PORT}
          COPY publish/ /app/
          ENTRYPOINT ["dotnet", "${APP_DLL}"]
          EOF

          echo "Dockerfile created:"
          cat deploy_input/Dockerfile

      - name: 🏗️ Build Docker image on laptop
        shell: bash
        run: |
          set -euo pipefail
          docker build -t ${APP_NAME}:latest ./deploy_input

      - name: 🧹 Remove old container
        shell: bash
        run: |
          set -euo pipefail
          docker rm -f ${CONTAINER_NAME} || true

      - name: 🚀 Run new container
        shell: bash
        run: |
          set -euo pipefail
          docker run -d \
            --name ${CONTAINER_NAME} \
            -p ${HOST_PORT}:${CONTAINER_PORT} \
            --restart unless-stopped \
            ${APP_NAME}:latest

      - name: ✅ Verify running container
        shell: bash
        run: |
          set -euo pipefail
          sleep 3
          docker ps --filter "name=${CONTAINER_NAME}"
          docker logs --tail 50 ${CONTAINER_NAME} || true
